body:
  text: 諸般湯煎桂漿生津止渇益氣和中去濕逐飲生薑三斤取汁熟水二斗赤茯苓三兩去皮爲末桂三兩去皮爲末麴末半斤杏仁一百箇湯洗去皮尖生研爲􅅺大麥蘖半兩爲末白沙􅁡三斤煉淨右用前藥􅁡水拌和匀入淨磁礶内油紙封口數重泥固濟氷窖内放三日方熟綿濾氷浸暑月飲之桂沉漿去濕逐飲生津止渇順氣紫蘇葉一兩剉沉香三錢剉烏梅一兩取肉沙糖六兩右件四味用水五六椀􅆈至三椀濾去滓入桂漿一升合和作漿飲之荔枝膏生津止渇去煩烏梅半斤取肉桂一十兩去皮剉沙糖二十六兩麝香半錢研生薑汁五兩熟􅁡一十四兩右用水一斗五升􅆈至一半濾去滓下沙糖生薑汁再􅆈去柤澄㝎少時入麝香擾匀澄清如常任意服梅子丸生津止渇解化酒毒去濕烏梅一兩半取􅁏白梅一兩半取􅁏乾木􅀲一兩半紫蘇葉一兩半甘草一兩炙檀香二錢麝香一錢研右為末入麝香和匀沙糖為丸如彈大每服一丸噙化五味子湯代葡萄酒飲生津止渇暖精益氣北五味一斤淨􅁏紫蘇葉六兩人參四兩去蘆剉沙糖二斤右件用水二斗􅆈至一斗濾去滓澄清任意服之人參湯代酒飲順氣開􅅐膈止渇生津新羅參四兩去蘆剉橘及一兩去白紫蘇葉二兩沙糖一斤右件用水二斗焚至一斗去滓澄清任意飲之仙术湯去一切不正之氣温脾胃進飲食辟瘟疫除寒濕蒼术一斤米泔浸三日竹刀子切片焙乾為末􅚬香二兩炒為末甘草二兩炒為末白麵一斤炒乾􅀥二升焙乾為末塩四兩炒右件一同和匀每日空心白湯􅀧服杏霜湯調順肺氣利􅅐膈治欬嗽粟米五升炒為麺杏仁二􅂛去皮尖麸炒研鹽三兩炒右件拌匀每日空心白湯調一錢入酥少許􅀹佳山藥湯􅀘虚益氣温中潤肺山藥一斤煑熟粟米半升炒為麺杏仁二斤炒令過熟去皮尖切如米右件每日空心白湯調二餞入酥油少許山藥任意四和湯治腹内冷痛脾胃不和白麺一斤炒芝蔴一斤炒􅚬香二兩炒塩一兩炒右件並為末每日空心白湯􅀧服􅀥薑湯和脾胃進飲食生薑一斤切作片􅀥三升去核炒甘草二兩炒塩二两炒右件為末一䖏拌匀每日空心白湯􅀧服茴香湯治元蔵虚弱臍腹冷痛茴香一斤炒川練子半斤陳皮半斤去白甘草四兩炒塩半斤炒右件為細末相和勻每日空心白湯􅀧服破氣湯治元蔵虚弱腹痛􅅐膈閉悶杏仁一斤去皮尖麸炒别研茴香四兩炒良薑一兩蓽澄茄二兩陳皮二兩去白桂花半斤薑黄一兩木香一兩丁香一兩甘草半斤塩半斤右件為細末空心白湯􅀧服白梅湯治中􅀬五心煩燥霍亂嘔吐乾渇津液不通白梅肉一斤白檀四兩甘草四兩塩半斤右件為細末每服一錢入生薑汁少許白湯調下木􅀲湯治脚氣不仁􅂰勞冷痺疼痛木􅀲四箇蒸熟去皮研爛如泥白沙􅁡二斤煉浄右件二味調和勻入淨磁器内盛之空心白湯􅀧服橘皮醒酲湯治酒醉不觧嘔噫吞酸香橙皮一斤去白陳橘皮一斤去白檀香四兩􅁑花半斤菉荳花半斤人參二兩去蘆白荳蒄仁二兩鹽六兩炒右件為細末每日空心白湯􅀧服渇忒餅兒生津止渇治嗽渇忒一兩二錢新羅參一兩去蘆菖蒲一錢各為細末白納八三兩研係沙糖右件將渇忒用葡萄酒化成膏和上項藥末令匀為劑印作餅每用一餅徐徐噙化官桂渇忒餅兒生津止寒嗽官桂二錢為末渇忒一兩二錢新羅參一兩二錢去蘆為末白納八三兩研右件將渇忒用玫瑰水化成膏和藥末為劑用訶子油印作餅子每用一餅徐徐噙化荅必納餅兒清頭目利咽膈生津止渇治嗽荅必納二錢為末即草龍膽新羅參一兩二錢去蘆為末白納八五兩研右件用赤赤哈納即北地酸角兒􅆈成膏和藥末為劑印作餅兒每用一餅徐徐噙化橙香餅兒寛中順氣清利頭目新橙皮一兩焙去白沉香五錢白檀五錢􅒦砂五錢白荳䓻仁五錢蓽澄茄三錢南􅉇砂三錢别研龍腦二錢別研麝香二錢别研右件為細末甘草膏和劑印餅每用一餅徐徐噙化牛髄膏子補精髄壯筋骨和血氣延年益夀黄精膏五兩地黄膏三兩天門冬膏一兩牛骨頭内取油二兩右件􅀅黄精膏地黄膏天門冬膏與牛骨油一同不住手用銀匙攪令冷定和匀成膏每日空心温酒調一匙頭木􅀲煎木􅀲十箇去皮穰取汁􅆈水盡白沙糖十斤煉淨右件一同再􅆈成煎香圎煎香圎二十箇去皮取􅁏白沙糖十斤煉浄右件一同再􅆈成煎株子煎株子一百箇取淨􅁏白沙糖五斤煉淨右件同􅆈成煎紫蘇煎紫蘇葉五斤乾木􅀲五斤白沙糖十斤煉淨右件一同􅆈成煎金橘煎金橘五十箇去子取皮白沙糖三斤右件一同焚成煎櫻桃煎櫻桃五十斤取汁白沙糖二十五斤同􅆈成煎桃煎大桃一百箇去皮切片取汁白沙􅁡二十斤煉淨右件一同􅆈成煎石榴􅄴石榴子十斤取汁白沙糖十斤煉淨右件一同􅆈成煎小石榴煎小石榴二斗蒸熟去子研為泥白沙􅁡十斤煉淨右件一同􅆈成煎五味子舍児別新北五味十斤去子水浸取汁白沙糖八斤煉淨右件一同􅆈成煎赤赤哈納係酸刺赤赤哈納不以多少水浸取汁右件用銀石器内􅆈成膏松子油松子不以多少去皮搗研為泥右件水絞取汁􅆈成取浮清油綿濾淨再熬澄清杏子油杏子不以多少連皮搗碎右件水煑􅆈取浮油綿濾淨再熬成油酥油牛乳中取浮凝􅆈而為酥醍醐油取上等酥油約重千斤之上者煎􅆈過濾淨用大磁瓮貯之冬月取瓮中心不凍者謂之醍醐馬思哥油取淨牛妳子不住手用阿赤係打油木器也打取浮凝者為馬思哥油今亦云白酥油枸􅂎茶枸􅂎五斗水淘洗淨去浮麥焙乾用白布筒淨去蒂蕚黒色選揀紅熟者先用雀舌茶展溲碾子茶芽不用次碾枸􅂎為細末每日空心用匙頭入酥油攪匀温酒調下白湯亦可忌與酪同食玉磨茶上等紫筍五十斤篩筒淨蘇門炒米五十斤篩筒淨一同拌和勻入玉磨内磨之成茶金字茶係江南湖州造進末茶范殿帥茶係江浙慶元路造進茶芽味色絶勝諸茶紫筍雀舌茶選新嫰芽蒸過為紫筍有先春次春探春味皆不及紫筍雀舌女須兒出直北地面味温甘西畨茶岀本土味苦澀煎用酥油川茶藤茶夸茶皆出四川燕尾茶出江浙江西孩兒茶出廣南温桑茶出黒峪凡諸茶味甘苦㣲寒無毒去痰􅀬止渇利小便消食下氣清神少睡清茶先用水滚過濾淨下茶芽少時煎成炒茶用鐡鍋燒赤以馬思哥油牛妳子茶芽同炒成蘭膏玉磨末茶三匙頭麺酥油同攪成膏沸湯􅀧之酥簽金字末茶兩匙頭入酥油同攪沸湯􅀧之建湯玉磨末茶一匙入碗内研匀百沸湯􅀧之香茶白茶一袋龍腦成片者三錢百藥煎半錢麝香二錢同研細用香粳米􅆈成粥和成劑印作餅泉水甘平無毒治消渇反胃􅀬痢今西山有玉泉水甘羙味勝諸泉井華水甘平無毒主人九竅大驚出血以水噀面即住及洗人目瞖投酒醋中令不損敗平旦汲者是也今内府御用之水常於鄒店取之縁自至大初武宗皇帝幸栁林飛放請皇太后同徃觀焉由是道經鄒店因渴思茶遂命普䦨奚國公金界奴朶兒只煎造公親詣諸井選水惟一井水味頗清甘汲取煎茶以進上稱其茶味特異内府常進之茶味色兩絶乃命國公於井所建觀音堂盖亭井上以欄翼之刻石紀其事自後御用之水日必取焉所造湯茶比諸水殊勝隣左有井皆不及也此水煎􅆈過澄􅉷如一常較其分兩與別水增重神仙服食鐡甕先生瓊玉膏此膏填精􅀘髄腸化為筋萬神具足五藏盈溢髄血滿髮白變黒返老還童行如奔馬日進數服終日不食亦不飢開通強志日誦萬言神識髙邁夜無夢想人年二十七􅀊以前服此一料可夀三百六十􅀊四十五􅀊以前服者可夀二百四十􅀊六十三􅀊以前服者可夀一百二十􅀊六十四􅀊以上服者可夀百􅀊服之十劑絶其慾修隂功成地仙矣一料分五䖏可救五人癰疾分十䖏可救十人勞疾修合之時沐浴至心勿輕示人新羅參二十四兩去蘆生地黄一十六斤汁白茯苓四十九兩去黒皮白沙􅁡一十斤煉淨右件人參茯苓為細末􅁡用生絹濾過地黄取自然汁搗時不用銅鐡器取汁盡去滓用藥一䖏拌和匀入銀石器或好磁器内封用淨􅁓二三十重封閉入湯内以桑柴火煑三晝夜取出用蠟紙數重包瓶口入井口去火毒一伏時取出再入舊湯内煑一日出水氣取出開封取三匙作三盞祭天地百神焚香設拜至誠端心每日空心酒調一匙頭地仙煎治腰膝疼痛一切腹内冷病令人顔色恱澤骨髄堅固行及奔馬山藥一斤杏仁一升湯泡去皮尖生牛妳子二升右件將杏仁研細入牛妳子山藥拌絞取汁用新磁瓶宻封湯煑一日每日空心酒調一匙頭金髄煎延年益夀填精補髄乆服髮白變黒返老還童枸􅂎不以多少採紅熟者右用無􅁅酒浸之冬六日夏三日於沙盆内研令爛細然後以布袋絞取汁與前浸酒一同慢火􅆈成膏扵淨磁器内封貯重湯煑之每服一匙頭入酥油少許温酒調下天門冬膏去積聚風痰癲疾三䖝伏尸除瘟疫輕身益氣令人不飢延年不老天門冬不以多少去皮去根􅂡洗淨右件搗碎布絞取汁澄清濾過用磁器沙鍋或銀器慢火􅆈成膏每服一匙頭空心温酒調下道書八帝經欲不畏寒取天門冬茯苓為末服之每日頻服大寒時汗出單衣抱朴子云杜紫㣲服天門冬御八十妾有子一百四十人日行三百里列仙子云赤松子食天門冬齒落更生細髮復出神仙傳甘始者太原人服天門冬在人間三百年修真秘㫖神仙服天門冬一百日後怡泰和顔羸劣者強三百日身輕三年身走如飛抱朴子云楚文子服地黄八年夜視有光手上車弩抱朴子云南陽文氏值亂逃於壷山飢困有人教之食术遂不飢數年乃還郷里顔色更少氣力轉勝藥經云必欲長生當服山精是蒼术也抱朴子云任季子服茯苓一十八年玉女􅀙之􅀎隱彰不食榖面生光孫真人枕中記茯苓乆服百日百病除二百日夜晝二服後役使􅀑神四年後玉女来侍抱朴子云陵陽仲子服逺志二十年有子三十人開書所見便記不忘東華真人煑石經舜常登蒼梧山曰厥金玉香草即五加也服之延年故云寧得一把五加不用金玉滿車寧得一斤地榆安用明月寳珠昔魯定公母單服五加皮酒以􅆀長生如張子聲楊始建王叔才于世彦䓁皆古人服五加皮酒而房室不絶皆夀三百􅀊有子三二十人世世有服五加皮酒而􅀗年夀者甚衆抱朴子云趙他子服桂二十年足下毛生日行五百里力舉千斤列仙傳偓佺食松子􅀎飛行徤走如奔馬神仙傳松子不以多少研為膏空心温酒調下一匙頭日三服則不飢渇乆服日行五百里身輕體徤神仙傳治百節疼痛乆風虚脚痺痛松節釀酒服之神驗神仙傳槐實扵牛膽中漬浸百日隂乾每日吞一枚十日身輕二十日白髪再黒百日通神食療云枸􅂎葉䏻令人筋骨壮除風􅀘益去虚勞益陽事春夏秋採葉冬採子可乆食之太清諸本草七月七日採蓮花七分八月八日採蓮根八分九月九日採蓮子九分隂乾食之令人不老食療云如腎氣虚弱取生栗子不以多少令風乾之每日空心細嚼之三五箇徐徐嚥之神仙服黄精成地仙昔臨川有士人虐其婢婢乃逃入山中乆之見野草枝葉可愛即㧞取食之甚羙自是常食之乆而不飢遂輕徤夜息大木下聞草動以為虎懼而上木避之及曉下平地其身豁然凌空而去或自一峯之頂若飛鳥焉數􅀊其家採薪見之告其主使捕之不得一日遇絶壁下以網三面圍之俄而騰上山頂其主異之或曰此婢安有仙風道骨不過靈藥服食遂以酒饌五味香羙置徃来之路觀其食否果来食之遂不䏻逺去擒之問以述其故所􅃌食之草即黄精也謹按黄精寛中益氣􅀘五蔵調良肌肉充實骨體堅強筋骨延年不老顔色鮮明髮白再黒齒落更生神枕法漢武帝東廵泰山下見老翁鋤扵道背上有白光髙數尺帝怪而問之有道術否老翁對曰臣昔年八十五時衰老垂死頭白齒落有道士者教臣服􅀥飲水絶榖并作神枕法中有三十二物内二十四物善以當二十四氣其八物毒以應八風臣行轉少黒髮更生堕齒復出日行三百里臣今年一百八十矣不􅀎棄世入山顧戀子孫復還食榖又巳二十餘年猶得神枕之力徃不復老武帝視老翁顔壯當如五十許人驗問其隣人皆云信然帝乃􅀙授其方作枕而不􅀎随其絶榖飲水也神枕方用五月五日七月七日取山林柏以為枕長一尺二寸髙四寸空中容一斗二升以柏心赤者為盖厚二分盖致之令宻又使可開閉也又鑚盖上為三行每行四十九孔凡一百四十七孔令容粟大用下項藥芎藭當歸白芷辛夷杜衡白术藁本木蘭蜀椒桂乾薑防風人參桔梗白薇荆實肉蓯蓉飛廉柏實薏苡仁欵冬花白衡秦椒麋蕪凡二十四物以應二十四氣烏頭附子䔧蘆皁角菵草凡石半夏細辛八物毒者以應八風右三十二物各一兩皆㕮咀以毒藥上安之滿枕中用嚢以衣枕百日面有光澤一年體中諸疾一一皆愈而身盡香四年白髪變黒齒落重生耳目聦明神方驗秘不傳非人也武帝以問東方朔荅云昔女㢘以此傳玉青玉青以傳廣成子廣成子以傳黄帝近者榖城道士淳于公枕此藥枕百餘􅀊而頭髪不白夫病之来皆􅀙陽脉起今枕藥枕風邪不得侵人矣又雖以布囊衣枕猶當復以幃嚢重包之湏欲卧時乃脫去之耳詔賜老翁疋帛老翁不受曰臣之於君猶子之於父也子知道以上之扵父義不受賞又臣非賣道者以陛下好善故進此耳帝止而更賜諸藥神仙服食菖蒲㝷九節者窨乾百日為末日三服乆服聦明耳目延年益夀神仙服食胡麻食之􅀎除一切痼疾乆服長生肥徤人延年不老抱朴子服五味十六年面色如玉入火不灼入水不濡抱朴子云韓聚服菖蒲十三年身上生毛日誦萬言冬􅃝不寒須得石上生者一寸九節紫花􅀹善食醫心鏡藕實味甘平無毒􅀘中養氣清神除百病乆服令人止渇悅澤日華子云蓮子并石蓮去心乆食令人心喜益氣止渇治腰痛泄精㵼痢日華子云蓮花蘂乆服鎮心益色駐顔輕身日華子云何首烏味甘無毒乆服壯筋骨益精髄黒髭鬂令人有子四時所宜春三月此謂發陳天地俱生萬物以榮夜卧早起廣歩於庭被髮緩形以使志生生而勿殺子而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少春氣温宜食麥以凉之不可一於温也禁温飲食及􅀬衣服夏三月此謂蕃秀天地氣交萬物華實夜卧卑起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉􅀵者少冬至重病夏氣􅀬宜食菽以寒之不可一於􅀬也禁温飲食飽食濕地濡衣服秋三月此謂容平天氣以急地氣以明早卧早起與雞俱興使志安寧以緩秋形􅀵歛神氣使秋氣平無外其志使肺氣清此秋氣之應養􅀵之道也逆之則傷肺冬為飱泄奉藏者少秋氣燥宜食麻以潤其燥禁寒飲食寒衣服冬三月此謂閉藏水氷地坼無擾乎陽早卧晚起必待日光使志若伏若匿若有私意若已有得去寒就温無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少冬氣寒宜食􅎟以􅀬性治其寒禁􅀬飲食温炙衣服五味偏走酸澀以􅀵多食則膀胱不利為癃閉苦燥以堅多食則三焦閉塞為嘔吐辛味薫蒸多食則上走於肺榮衛不時而心洞鹹味湧泄多食則外注扵脉胃竭咽燥而病渇甘味弱劣多食則胃柔緩而䖝過故中滿而心悶辛走氣氣病勿多食辛鹹走血血病勿多食鹹苦走骨骨病勿多食苦甘走肉肉病勿多食甘酸走筋筋病勿多食酸肝病禁食辛宜食粳米牛肉葵􅀥之􅀋心病禁食鹹宜食小荳犬肉李韭之􅀋脾病禁食酸宜食大荳豕肉栗藿之􅀋肺病禁食苦宜食小麥羊肉杏薤之􅀋腎病禁食甘宜食黄􅎟雞肉桃葱之􅀋多食酸肝氣以津脾氣乃絶則肉胝䐢而唇掲多食鹹骨氣勞短肥氣折則脉凝泣而變色多食甘心氣喘滿色黒腎氣不平則骨痛而髪落多食苦脾氣不濡胃氣乃厚則皮槁而毛㧞多食辛筋脉沮㢮精神乃央則筋急而爪枯五榖為食五菓為助五肉為益五菜為充氣味合和而食之則補精益氣雖然五味調和食飲口嗜皆不可多也多者生疾少者為益百味珎饌日有慎節是為上矣食療諸病生地黄雞治腰背疼痛骨髄虚損不䏻乆立身重氣乏盗汗少食時復吐利生地黄半斤飴糖五兩烏雞一枚右三味先􅀅雞去毛腸肚淨細切地黄與糖相和匀内雞腹中以銅器中放之復置甑中蒸炊飯熟成取食之不用塩醋唯食肉盡却飲汁羊􅁡膏治虚勞腰痛欬嗽肺痿骨蒸熟羊脂五兩熟羊髄五兩白沙􅁡五兩煉凈生姜汁一合生黄地汁五合右五味先以羊脂煎令沸次下羊髄又令沸次下􅁡地黄生薑汁不住手攪微火􅆈數沸成膏毎日空心温酒調一匙頭或作羮湯或作粥食之亦可羊藏羮治腎虚勞損骨髄傷敗羊肝肚腎心肺各一具湯洗淨牛酥一兩胡椒一兩蓽撥一兩豉一合陳皮二錢去白良薑二錢草菓兩箇葱五莖右件先將羊肝等慢火煑令熟將汁濾淨和羊肝等并藥一同入羊肚内縫合口令絹袋盛之再煑熟入五味旋旋任意食之羊骨粥治虚勞腰膝無力羊骨一付全者槌碎陳皮二錢去白良薑二錢草菓二箇生薑一兩塩少許右水三斗慢火􅆈成汁濾出澄清如常作粥或作羮湯亦可羊脊骨羮治下元乆虚腰腎傷敗羊脊骨一具全者搥碎肉蓯容一兩洗切作片草果三箇蓽撥二錢右件水􅆈成汁濾去滓入葱白五味作麺羮食之白羊腎羮治虚勞陽道衰敗腰膝無力白羊腎二具切作片肉蓯蓉一兩酒浸切羊脂四兩切作片胡􅎛二錢陳皮一錢去白蓽撥二錢草果二錢右件相和入葱白塩醬煑作湯入麺􅽀子如常作羮食之猪腎粥治腎虚勞損腰􅂰無力疼痛猪腎一對去脂膜切粳米三合草果二錢陳皮一錢去白縮砂二錢右件先􅀅猪腎陳皮等煑成汁濾去滓入酒少許次下米成粥空心食之枸􅂎羊腎粥治陽氣衰敗腰脚疼痛五勞七傷枸􅂎葉一斤羊腎二對細切葱白一莖羊肉半斤妙右四味拌匀入五味煑成汁下米􅆈成粥空腹食之鹿腎羮治腎虚耳聾鹿腎一對去脂膜切右件於豆豉中入粳米三合煑粥或作羮入五味空心食之羊肉羮治腎虚衰弱腰脚無力羊肉半斤細切蘿蔔一箇切作片草果一錢陳皮一錢去白良薑一錢蓽撥一錢胡􅎛一錢葱白三莖右件水􅆈成汁入鹽醬􅆈湯下麺􅽀子作羮食之將湯澄清作粥食之亦可鹿蹄湯治諸風虚腰脚疼痛不􅀎踐地鹿蹄四隻陳皮二錢草果二錢右件煑令爛熟取肉入五味空腹食之鹿角酒治卒患腰痛暫轉不得鹿角新者長二三寸燒令赤右件内酒中浸二宿空心飲之立效黒牛髄煎治腎虚弱骨傷敗痩弱無力黒牛髄半斤生地黄汁半斤白沙􅁡半斤煉去蠟右三味和勻煎成膏空心酒調服之狐肉湯治虚弱五藏邪氣狐肉五斤湯洗淨草果五箇􅒦砂二錢葱一握陳皮一餞去白良薑二錢哈昔􅅺一錢即阿魏右件水一斗煑熟去草菓等次下胡椒二錢薑黄一錢醋五味調和匀空心食之烏鷄湯治虚弱勞傷心腹邪氣烏雄鷄一隻撏洗淨切作塊子陳皮一餞去白良薑一錢胡椒二錢草菓二箇右件以葱醋醬相和入瓶内封口令煑熟空腹食醍醐酒治虚弱去風濕醍醐一盞右件以酒一盃和勻温飲之效驗山藥飥治諸虚五勞七傷心腹冷痛骨髄傷敗羊骨五七塊帶内蘿蔔一􅋞切作大片葱白一莖草果五箇陳皮一錢去白良薑一錢胡椒二錢􅒦砂二錢山藥二斤右件同煑取汁澄清濾去柤麺二斤山藥二斤煑熟研泥搜麺作飥入五味空腹食之山藥粥治虚勞骨蒸乆冷羊肉一斤去脂膜爛煑熟研泥山藥一斤煑熟研泥右件肉湯内下米三合煑粥空腹食之酸􅀥粥治虚勞心煩不得睡卧酸􅀥仁一椀右用水絞取汁下米三合煑粥空腹食之生地黄粥治虚弱骨蒸四肢無力漸漸羸瘦心煩不得睡卧生地黄汁一合酸􅀥仁水絞取汁二盞右件水煑同􅆈數沸次下米三合煑粥空腹食之椒麺羮治脾胃虚弱久患冷氣心腹結痛嘔吐不䏻下食川椒三錢炒為末白麺四兩右件同和匀入塩少許扵豆豉作麺條煑羮食之蓽撥粥治脾胃虚弱心腹冷氣痛妨悶不䏻食蓽撥一兩胡椒一兩桂五錢右三味為末每用三錢水三大碗入豉半合同煑令熟去滓下米三合作粥空服食之良薑粥治心腹冷痛積聚停飲髙良薑半兩為末粳米三合右件水三大椀煎髙良薑至二椀去滓下米煑粥食之效驗呉茱茰粥治心腹冷氣衝脇肋痛吳茱茰半兩水洗去涎焙乾炒為末右件以米三合一同作粥空腹食之牛􅁏脯治脾胃乆冷不思飲食牛肉五斤去脂膜切作大片胡椒五錢蓽撥五錢陳皮二錢去白草果二錢􅒦砂二錢良薑二錢右件為細末生薑汁五合葱汁一合塩四兩同肉拌匀淹二日取出焙乾作脯任意食之蓮子粥治心志不寧􅀘中強志聦明耳目蓮子一􅂛去心右件煑熟研如􅅺與粳米三合作粥空腹食之雞頭粥治精氣不足強志明耳目鷄頭實三合右件煑熟研如泥與粳米一合煑粥食之鷄頭羮粉治濕痺腰膝痛除暴疾益精氣強心志耳目聦明鷄頭磨成粉羊脊骨一付帶􅁏􅆈取汁右件用生薑汁一合入五味調和空心食之桃仁粥治心腹痛上氣咳嗽􅅐膈妨滿喘急桃仁三兩湯煑熟去尖皮研右件取汁和粳米同煑粥空腹食之生地黄粥治虚勞瘦弱骨蒸寒􅀬徃来咳嗽唾血生地黄汁二合右件煑白粥臨熟時入地黄汁攪匀空腹食之鯽魚羮治脾胃虚弱泄痢乆不瘥者食之立效大鯽魚二斤大蒜兩塊胡椒二錢小椒二錢陳皮二錢􅒦砂二錢蓽撥二錢右件葱醬塩料物蒜入魚肚内煎熟作羮五味調和令匀空心食之炒黄麺治泄痢腸胃不固白麺一斤炒令焦黄右件每日空心温水調一匙頭乳餅麺治脾胃虚弱赤白泄痢乳餅一箇切作豆子様右件用麺拌煑熟空腹食之炙黄鷄治脾胃虚弱下痢黄雌雞隻撏淨右以鹽醬醋茴香小椒末同拌勻刷雞上令炭火炙乾焦空腹食之牛妳子煎蓽撥法貞觀中太宗苦於痢疾衆醫不効問左右䏻治愈者當重賞時有術士進此方用牛妳子煎蓽撥服之立瘥猯肉羮治水腫浮氣腹脹小便澀少猯肉一斤細切葱一握草果三箇右件用小椒豆豉同煑爛熟入粳米一合作羮五味調匀空腹食之黄䳄鷄治腹中水癖水腫黄䳄鷄一隻撏淨草果二錢赤小豆一升右件同煑熟空心食之靑鴨羮治十腫水病不瘥靑頭鴨一隻退淨草果五箇右件用赤小豆半升入鴨腹内煑熟五味調空心食蘿蔔粥治消渇舌焦口乾小便􅁆大蘿蔔五箇煑熟絞取汁右件用粳米三合同水并汁煑粥食之野鷄羮治消渇口乾小便頻􅁆野雞一隻撏淨右入五味如常法作羮臛食之鵓鴿羮治消渇飲水無度白鵓鴿一隻切作大片右件用土蘇一同煑熟空腹食之鷄子黄治小便不通鷄子黄一枚生用右件服之不過三服熟亦可食葵菜羮治小便癃閉不通葵菜葉不以多少洗擇淨右煑作羮入五味空腹食之鯉魚湯治消渇水腫黄疸脚氣大鯉魚一頭赤小豆一合陳皮二錢去白小椒二錢草果二錢右件入五味調和勻煑熟空腹食之馬齒菜粥治脚氣頭面水腫心腹脹滿小便淋澀馬齒菜洗浄取汁右件和粳米同煑粥空腹食之小麥粥治消渇口乾小麥淘淨不以多少右以煑粥或炊作飯空腹食之驢頭羮治中風頭眩手足無力筋骨煩痛言語蹇澀烏驢頭一枚撏洗淨胡椒二錢草果二錢右件煑令爛熟入豆豉汁中五味調和空腹食之驢肉湯治風狂憂愁不樂安心氣烏驢肉不以多少切右件扵豆豉中爛煑熟入五味空心食之狐肉羮治驚風癲癎神情恍惚言語錯謬歌􅀏無度狐􅁏不以多少及五藏右件如常法入五味煑令爛熟空心食之熊肉羮治諸風脚氣痺痛不仁五緩筋急熊肉一斤右件於豆豉中入五味葱醬煑熟空腹食之烏鷄酒治中風背強舌直不得語目睛不轉煩􅀬烏雌雞一隻撏洗淨去腸肚右件以酒五升煑取酒二升去滓分作三服相􅁇服之汁盡無時􅆈葱白生薑粥投之盖覆取汁羊肚羮治諸中風羊肚一枚洗淨粳米二合葱白數莖豉半合蜀椒去目閉口者炒出汗三十粒生薑二錢半細切右六味拌勻入羊肚内爛煑熟五味調和空心食之􅁑粉羮治中風心脾風􅀬言語蹇澀精神昏憤手足不遂􅁑粉半斤搗取粉四兩荆芥穂一兩豉三合右三味先以水煑荆芥豉六七沸去滓取汁次􅀅􅁑粉作索麺於汁中煑熟空腹食之荆芥粥治中風言語􅏝澀精神昏憒口面喎斜荊芥穂一兩薄荷葉一兩豉三合白粟米三合右件以水四升煑取三升去滓下米煑粥空腹食之麻子粥治中風五藏風􅀬語言􅏝澀手足不遂大腸滯澀冬麻子二兩炒去皮研白粟米三合薄荷葉一兩荆芥穂一兩右件水三升煑薄荷荆芥去滓取汁入麻子仁同煑粥空腹食之惡實菜即牛旁子又名䑕粘子治中風燥􅀬口乾手足不遂及皮膚􅀬瘡惡實菜葉嫰肥者酥油右件以湯煑惡實葉三五升取出以新水淘過布絞取汁入五味酥􅀧食之烏驢皮湯治中風手足不遂骨節煩疼心燥口眼面目喎斜烏驢皮一張撏洗淨右件蒸熟細切如條於豉汁中入五味調和匀煑過空心食之羊頭膾治中風頭眩羸瘦手􅁕無力白羊頭一枚撏洗淨右件蒸令爛熟細切以五味汁調和膾空腹食之野猪臛治乆痔野鷄病下血不止肛門腫滿野猪肉二斤細切右件煑令爛熟入五味空心食之􅆩肝羮治乆痔下血不止􅆩肝一付右件煑熟入五味空腹食之鯽魚羮治乆痔腸風大便常有血大鯽魚一頭新鮮者洗淨切作片小椒二錢為未草果一錢為末右件用葱三莖煑熟入五味空腹食之服藥食忌但服藥不可多食生芫荽及蒜雜生菜諸滑物肥猪肉犬肉油膩物魚膾腥膻等物及忌見䘮尸産婦淹􅁾之事又不可食陳臭之物有术勿食桃李雀肉胡荽蒜青魚等物有蔾蘆勿食猩肉有巴豆勿食蘆笋及野猪肉有黄連桔梗勿食猪肉有地黄勿食蕪荑有半夏菖蒲勿食飴糖及羊肉有細辛勿食生菜有甘草勿食菘菜海藻有牡丹勿食生胡荽有商陸勿食犬肉有常山勿食生葱生菜有空青朱砂勿食血凡服藥通忌食血有茯苓勿食醋有鼈甲勿食莧菜有天門冬勿食鯉魚凡乆服藥通忌未不服藥又忌滿日正五九月忌巳日二六十月忌寅日三七十一月忌亥日四八十二月忌申日食物利害盖食物有利害者可知而避之麺有鄓氣不可食生料色臭不可用􅄴老而飯溲不可食煑肉不變色不可食諸肉非宰殺者勿食諸肉臭敗者不可食諸腦不可食凡祭肉自動者不可食猪羊疫死者不可食曝肉不乾者不可食馬肝牛肝皆不可食兎合眼不可食燒肉不可用桑柴火獐鹿麋四月至七月勿食二月内勿食兎肉諸肉脯忌米中貯之有毒魚餒者不可食羊肝有孔者不可食諸鳥自閉口者勿食蟹八月後可食餘月勿食蝦不可多食無􅂡及腹下丹煑之白者皆不可食臘月脯腊之属或經雨漏所漬䖝䑕嚙殘者勿食海味糟藏之属或經濕􅀬變損日月過乆者勿食六月七月勿食鴈鯉魚頭不可食毒在腦中諸肝青者不可食五月勿食鹿傷神九月勿食犬肉傷神十月勿食熊肉傷神不時者不可食諸果核未成者不可食諸果落地者不可食諸果䖝傷者不可食桃杏雙仁者不可食蓮子不去心食之成霍亂甜􅀲雙蒂者不可食諸瓜沉水者不可食蘑菰勿多食發病榆仁不可多食令人􅉂菜着霜者不可食櫻桃勿多食令人發風葱不可多食令人虚芫荽勿多食令人多忘竹笋勿多食發病木耳赤色者不可食三月勿食蒜昏人目二月勿食蓼發病九月勿食着霜􅀲四月勿食胡荽生狐臭十月勿食椒傷人心五月勿食韮昏人五藏食物相反盖食不欲雜雜則或有所犯知者分而避之馬肉不可與倉米同食馬􅁏不可與蒼耳薑同食猪肉不可與牛肉同食羊肝不可與椒同食傷心兎肉不可與薑同食成霍亂羊肝不可與猪肉同食牛肉不可與栗子同食羊肚不可與小豆梅子同食傷人羊􅁏不可與魚膾酪同食猪􅁏不可與芫荽同食爛人腸馬妳子不可與魚膾同食生癥瘕鹿􅁏不可與鮠魚同食麋鹿不可與鰕同食麋􅁏脂不可與梅李同食牛肝不可與鮎魚同食生風牛腸不可與犬􅁏同食鷄􅁏不可與魚汁同食生癥瘕鵪鶉􅁏不可與猪􅁏同食面生黒鵪鶉􅁏不可與菌子同食發痔野鷄不可與蕎麺同食生䖝野鷄不可與胡桃蘑菰同食野鷄卵不可與葱同食生䖝雀􅁏不可與李同食鷄子不可與鼈􅁏同食鷄子不可與生葱蒜同食損氣鷄􅁏不可與兎􅁏同食令人泄瀉野鷄不可與鯽魚同食鴨􅁏不可與鼈􅁏同食野鷄不可與猪肝同食鯉魚不可與犬􅁏同食野雞不可與鮎魚同食食之令人生癲疾鯽魚不可與糖同食鯽魚不可與猪􅁏同食黄魚不可與喬麺同食蝦不可與猪􅁏同食損精蝦不可與糖同食蝦不可與鷄􅁏同食大豆黄不可與猪􅁏同食􅎟米不可與葵菜同食發病小豆不可與鯉魚同食楊梅不可與生葱同食柿梨不可與蟹同食李子不可與鷄子同食􅀥不可與􅁡同食李子菱角不可與􅁡同食葵菜不可與糖同食生葱不可與􅁡同食萵苣不可與酪同食竹笋不可與糖同食蓼不可與魚膾同食莧菜不可與鼈􅁏同食韮不可與酒同食苦苣不可與􅁡同食薤不可與牛􅁏同食生癥瘕芥末不可與兎􅁏同食生瘡食物中毒諸物品􅀋有根性本毒者有無毒而食物成毒者有雜合相畏相惡相反成毒者人不戒慎而食之􅆀傷腑臓和亂腸胃之氣或輕或重各随其毒而為害随毒而觧之如飲食後不知記何物毒心煩滿悶者急煎苦參汁飲令吐出或煑犀角汁飲之或苦酒好酒煑飲皆良食菜物中毒取鷄糞焼􅁅水調服之或甘草汁或煑􅁑根汁飲之胡粉水調服亦可食􅀲過多腹脹食塩即消食蘑菰菌子毒地􅄴觧之食菱角過多腹脹滿悶可暖酒和薑飲之即消食野山芋毒土漿觧之食瓠中毒煑􅎟穰汁飲之即解食諸雜􅁏毒及馬肝漏脯中毒者燒猪骨􅁅調服或芫荽汁飲之或生韮汁亦可食牛羊肉中毒煎甘草汁飲之食馬肉中毒嚼杏仁即消或蘆根汁及好酒皆可食犬肉不消成䐜脹口乾杏仁去皮尖水煑飲之食魚膾過多成蟲瘕大黄汁陳皮末同塩湯服之食􅈉中毒飲紫蘇汁或冬瓜汁或生藕汁觧之乾蒜汁蘆根汁亦可食魚中毒陳皮汁蘆根及大黄大豆朴消汁皆可食鴨子中毒煑秫米汁觧之食鷄子中毒可飲醇酒醋觧之飲酒大醉不觧大豆汁􅁑花椹子柑子皮汁皆可食牛肉中毒猪脂煉油一兩每服一匙頭温水調下即觧食猪肉中毒飲大黄汁或杏仁汁朴消汁皆可觧禽獸變異禽獸形􅀋依本體生者猶分其性質有毒無毒者况異像變生豈無毒乎倘不慎口致生疾病是不察矣獸岐尾馬蹄夜目羊心有孔肝有青黒鹿豹文羊肝有孔黒雞白首白馬青蹄羊獨角白羊黒頭黒羊白頭白鳥黄首羊六角白馬黒頭鷄有四距曝肉不燥馬生角牛肝葉孤蟹有獨螯魚有眼睫蝦無􅂡肉入水動肉經宿暖魚無腸膽腮􅁏落地不沾土魚目開合及腹下丹飲膳正要卷第二飲膳正要卷第三米􅂖品稻米味甘苦平無毒主温中令人多􅀬大便堅不可多食即糯米也蘇門者為上釀酒者多用粳米味甘苦平無毒主益氣止煩止􅂥和胃氣長肌􅄳味甘㣲温無毒􅀘虚乏止渇去血建脾治嗽小兒誤吞錢取一斤漸漸盡食之即出􅁡味甘平㣲温無毒主心腹邪氣諧驚癎􅀘五藏不足氣益中止痛解毒明耳目和百藥除衆病麹味甘大暖療藏府中風氣調中益氣開胃消食􅀘虚冷陳乆者良醋味酸温無毒消癰腫散水氣殺邪毒破血運除癥塊堅積醋有數種酒醋棗醋桃醋麥醋葡萄醋采醋為上入藥用醤味醎酸冷無毒除􅀬止煩殺百藥􅀬湯火毒殺一切魚肉菜􅂼毒豆醤主治勝麵醤陳乆者尤良豉味苦寒無毒主傷寒頭痛煩燥滿悶塩味醎温無毒主殺􅀑蠱邪疰毒傷寒吐胷中痰癖止心腹卒痛多食傷肺令人咳嗽失顔色酒味苦甘辣大􅀬有毒主行藥􅀔殺百邪通血脉厚腸胃潤皮膚消憂愁多飲損夀傷神易人本性酒有數般唯醖釀以随其性虎骨酒以酥炙虎骨搗碎釀酒治骨節疼痛風疰冷痺痛枸􅂎酒以甘州枸杞依法釀酒補虚弱長肌肉益精氣去冷風壮陽道地黄酒以地黄絞汁釀酒治虚弱壮筋骨通血脉治腹内痛松節酒仙方以五月五日採松節剉碎煮水釀酒治冷風虛骨弱脚不能履地茯苓酒仙方依法茯苓釀酒治虛勞壮筋骨延年益夀松根酒以松􅀣下撅坑置瓮取松根津液釀酒治風壮筋骨羊羔酒依法作酒大􅀘益人五加皮酒五加皮浸酒或依法釀酒治骨弱不􅀎行走乆服壮筋骨延年不老腽肭臍酒治腎虚弱壮腰􅂰大􅀘益人小黃米酒性􅀬不宜多飲昏人五藏煩􅀬多睡葡萄酒益氣調中耐飢強志酒有數等有西畨者有哈刺火者有平陽太原者其味都不及哈刺火者田地酒最佳阿刺吉酒味甘辣大􅀬有大毒主消冷堅積去寒氣用好酒蒸熬取露成阿刺吉速兒麻酒又名撥糟味㣲甘辣主益氣止渇多飲令人膨脹生痰獸品牛肉味甘平無毒主消渇止啘􅂥安中益氣􅀘脾胃牛髓􅀘中填精髓牛酥凉益心肺止渇嗽潤毛髮除肺痿心􅀬吐血牛酪味甘酸寒無毒主􅀬毒止消渇除􅎍中虚􅀬身面􅀬瘡牛乳腐㣲狼肉味醎性􅀬無毒主補益五藏厚腸胃填精髄腹有冷積者宜食之味勝狐犬肉狼喉嗉皮熟成皮條勒頭去頭痛狼皮熟作畨皮大暖狼尾馬􅎍堂前帶之辟邪令馬不驚狼牙帶之辟邪禽品丹雄鷄味甘平㣲温無毒主婦人崩中漏下赤白􅀘虚温中止血白雄鷄味酸無毒主下氣療狂邪補中安五藏治消渇烏雄雞味甘酸無毒主􅀘中止痛除心腹惡氣虚弱者􅄀食之烏䳄雞味甘温無毒主風寒濕痺五緩六急中惡腹痛及傷折骨疼安胎血療乳難黃䳄鷄味酸平無毒主傷中消渴小便數不禁腸澼􅂥痢􅀘五藏先患骨􅀬者不可食鷄子益氣多食令人有聲主産後痢與小兒食之止痢日華子云鷄子鎮心安五藏其白㣲寒療目赤􅀬痛除心下伏􅀬止煩滿欬逆雀肉味甘無毒性􅀬壯陽道令人有子冬月者良蒿雀味甘温無毒食之益陽道羙於諸雀紅麹味甘平無毒建脾益氣温中淹魚肉内用黒子児味甘平無毒開胃下氣燒餅内用極香羙馬思荅吉味苦香無毒去邪惡氣温中利膈順氣止痛生津解渇令人口香生回回地面云是極香種􅀋咱夫蘭味甘平無毒主心憂欝積氣悶不散乆食令人心喜即是回回地面紅花未詳是否哈昔泥味辛温無毒主殺諸䖝去臭氣破癥瘕下惡除邪解蠱毒即阿魏穏展味辛温苦無毒主殺䖝去臭其味與阿魏同又云即阿魏􅀣根淹羊肉香味甚羙胭脂味辛温無毒主産後血運心腹絞痛可傅逰腫梔子味苦寒無毒主五内邪氣療目赤􅀬利小便蒲黄味甘平無毒治心腹寒􅀬利小便止血疾回回靑味甘寒無毒解諸藥毒可傅􅀬毒瘡腫飲膳正要卷第三
