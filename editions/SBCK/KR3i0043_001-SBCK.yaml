鵪鶉鵪鶉二十箇打成事件蘿蔔二箇切薑末四兩羊尾子一箇各切如色􅁆麺二兩祚麺絲右件用煮鵪鶉湯杪葱醋調和盤兎兎児二箇切作事件蘿蔔二箇切羊尾子一箇切片細料物二錢右件用炒葱醋調和下麺絲二兩調和河西肺羊肺一箇韮六斤取汁麺二斤打糊酥油半斤胡椒二兩生薑汁二合右件用塩調和勻灌肺煑熟用汁澆食之薑黄腱子羊腱子一箇熟羊肋枝二箇截作長塊豆粉一斤白麺一斤咱夫蘭二錢梔子五錢右件用塩料物調和搽腱子下小油煠魚彈児大鯉魚十箇去皮骨頭尾羊尾子二箇同刴為泥生薑一兩切細葱二兩切細陳皮末三錢胡椒末一兩哈昔泥二錢右件下塩入魚􅁏内拌匀丸如彈児用小油煠芙蓉鷄鷄児十箇熟攅羊肚肺各一具熟切生薑四兩切胡蘿蔔十箇切鷄子二十箇煎作餅刻花様赤根芫荽打糝胭脂梔子染杏泥一斤右件用好􅁏湯炒葱醋調和􅁏餅児精羊􅁏十斤去脂膜筋搥為泥哈昔泥三錢胡椒二兩蓽撥一兩芫荽末一兩右件用塩調和勻捻餅入小油煠塩腸羊苦腸水洗浄右件用塩拌勻風乾入小油煠腦瓦刺熟羊􅎍子二箇切薄片鷄子二十箇熟右件用諸般生菜一同捲餅薑黄魚鯉魚十箇去皮鱗白麺二斤豆粉一斤芫荽末二兩右件用塩料物淹拌過搽魚入小油煠熟用生薑二兩切絲芫荽葉胭脂染蘿蔔絲炒葱調和攅鴈鴈五箇煑熟切攅薑末半斤右用好􅁏湯炒葱塩調和猪頭薑豉猪頭二箇洗浄切成塊陳皮二錢去白良薑二錢小椒二錢官桂二錢草果五箇小油一斤􅁡半斤右件一同熬成次下芥末炒葱醋塩調和蒲黄􅀲虀淨羊􅁏十斤煑熟切如􅀲虀小椒一兩蒲黄半斤右件用細料物一兩塩同拌勻攅羊頭羊頭五箇煑熟攅薑末四兩胡椒一兩右件用好􅁏湯炒葱塩醋調和攅牛蹄馬蹄熊掌一同牛蹄一付煑熟攅薑末二兩右件用好􅁏湯同炒葱塩調和細乞思哥羊􅁏一脚子煑熟切細蘿蔔二箇熟切細羊尾子一箇熟切哈夫児二錢右件用好􅁏湯同炒葱調和肝生羊肝一箇水浸切細絲生薑四兩切細絲蘿蔔二箇切細絲香菜蓼子各二兩切細絲右件用塩醋芥末調和馬肚盤馬肚賜一付煑熟切芥末半斤右件􅀅白血灌腸刻花様澀脾和脂刴心子攅成炒葱塩醋芥末調和煠䐑兒係細項䐑児二箇卸成各一節哈昔泥一錢葱一兩切細右件用塩一同淹拌少時入小油煠熟次用咱夫蘭二錢水浸汁下料物芫荽末同糝拌熬蹄児羊蹄五付退洗浄煑軟切成塊薑末一兩料物五錢右件下麺絲炒葱醋塩調和熬羊􅎍子羊􅎍子二箇退毛洗爭煑軟切作色􅁆塊薑末二兩料物五錢右件用好􅁏湯下麺絲炒葱塩醋調和魚膾新鯉魚五箇去皮骨頭尾生薑二兩蘿蔔二箇葱一兩香菜蓼子各切如絲胭脂打糝右件下芥末炒葱塩醋調和紅絲羊血同白麺依法煑熟生薑四兩蘿蔔一箇香菜蓼子各一兩切細絲右件用塩醋芥末調和燒鴈燒鷀䳓燒鴨子等一同鴈一箇去毛腸肚淨羊土一箇退洗月淨包鴈葱二兩芫荽末一兩右件用塩同調入鴈腹内焼之燒水札水札十箇撏洗淨芫荽末一兩葱十茎料物五錢右件用塩同拌匀焼或以肥麺包水札就籠内蒸熟亦可或以酥油水和麺包水札入爐􅌯内爐熟亦可柳蒸羊羊一口帶毛右件扵地上作爐三尺深周囬以石燒令通赤用鐡芭盛羊上用柳子盖覆土封以熟為度倉饅頭羊􅁏羊脂葱生薑陳皮各切細右件入料物塩醤拌和為饀鹿妳肪饅頭或做倉饅頭或做皮薄饅頭皆可鹿妳肪羊尾子各切如􅃌甲片生薑陳皮各切細右件入料物塩拌和為饀茄子饅頭羊􅁏羊脂羊尾子葱陳皮各切細嫩茄子去穰右件同􅁏作饀却入茄子内蒸下蒜酪香菜末食之剪花饅頭羊􅁏羊脂羊尾子葱陳皮各切細右件依法入料物塩醤拌饀包饅頭用剪子剪諸般花様蒸用胭脂染花水晶角児羊􅁏羊脂羊尾子葱陳皮生薑各切細右件入細料物塩醤拌勻用豆粉作皮包之酥皮奄子羊􅁏羊脂羊尾子葱陳皮生薑各切細或下􅀲哈孫係山丹根右件入料物塩醤拌匀用小油米粉與麺同和作皮撇列角児羊􅁏羊脂羊尾子新韮各切細右件入料物塩醤拌勻白麺作皮􅌯上炮熟次用酥油􅁡或以葫蘆瓠子作饀亦可時蘿角児羊􅁏羊脂羊尾子葱陳皮生薑各切細右件入料物塩醤拌匀用白麺􅁡與小油拌入鍋内滚水攪熟作皮天花包子或作蟹黄亦可藤花包子一同羊􅁏羊脂羊尾子葱陳皮生薑各切細天花滚水燙熟洗淨切細右件入料物塩醤拌饀白麺作薄皮蒸荷蓮兠子羊􅁏三脚子切羊尾子二箇切雞頭仁八兩松黄八兩八檐仁四兩蘑菰八兩杏泥一斤胡桃仁八兩必思荅仁四兩胭脂一兩梔子四錢小油二斤生薑八兩豆粉四斤山藥三斤鷄子三十箇羊肚肺各二付苦腸一付葱四兩醋半缾芫荽葉右件用塩醤五味調和勻豆粉作皮入盞内蒸用松黄汁澆食黒子兒燒餅白麺五斤牛妳子二升酥油一斤黒子児一兩㣲炒右件用塩减少許同和麺作燒餅牛妳子燒餅白麺五斤牛妳子二升酥油一斤茴香一兩㣲炒右件用塩减少許同和麺作焼餅􅔻餅經捲児一同白麺十斤小油一斤小椒一兩炒去汗茴香一兩炒右件隔宿用酵子塩减温水一同和麺次日入麺接肥再和成麺每斤作二箇入籠内蒸頗児必湯即羊辟􅂰骨生男女虚勞寒中羸瘦隂氣不足利血脉益經氣頗児必三四十箇水洗淨右件用水一鐡絡同熬四分中熬取一分澄濾淨去油去滓再凝定如欲食任意多少米哈訥􅀜列孫治五勞七傷藏氣虚冷常服􅀘中益氣羊後脚一箇去筋膜切碎右件用浄鍋内乾爁熟令盖封閉不透氣後用淨布絞紐取汁飲膳正要卷第一
