front:
  text: 御製飲膳正要序
  hash: sha256:c558877fd2693963b2ed032873ecfcebe59010457b2eb1a9daa8ced7f51b7dd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0043_SBCK_000-1a}
body:
  text: 朕惟人物皆禀天地之氣以生者也然物又天地之􅀁以養乎人者苟用之失其􅀁以養則至扵􅆷害者有矣如布帛菽粟雞豚之􅀋日用􅀁不䏻無其為養甚大也然過則失中不及則未至其為􅆷害一也其為養甚大者尚然而況不為養而為害之物焉可以不致其慎哉此特其養口體者耳若夫君子動息威儀起居出入皆當有其養焉又􅀁以養德也嘗觀前元飲膳正要一書其􅀁以養口體養德之要無􅀁不載盖當時尚醫􅀁論著其執藝事以致忠愛雖深扵聖賢之道者不外是也夫善莫大扵取諸人取諸人以為善大舜􅀁先肆朕嘉是書而用之以資攝養之助且鋟諸􅎚以廣惠利扵人亦庶㡬乎好生之仁雖然生禀扵天非人之􅀁􅀎為若或􅆷之與立巖墻之下者同有不由扵人乎故此非但攝養之助而抑順受其正之大助也景泰七年四月初一日臣聞古之君子善􅁱其身者動息節宣以養生飲食衣服以養體威儀行義以養徳是故周公之制禮也天子之起居衣服飲食各有其官皆統於􅃁宰盖慎之至也今上皇帝天縦聖明文思深逺御延閣閱圗書旦暮有恒則尊養徳性以酬酢萬幾得内聖外王之道焉於是趙國公臣常普蘭奚以所領膳醫臣怱思慧所撰飲膳正要以進其言曰昔世祖皇帝食飲必稽扵本草動静必凖乎法度是以身躋上夀貽子孫無彊之福焉是書也當時尚醫之論著者云噫進書者可謂􅀎執其藝事以􅆀其忠愛者矣是書進上中宫覽焉念祖宗衛生之戒知臣下陳義之勤思有以助聖上之誠身而推其仁民之至意命中政院使臣拜住刻梓而廣傳之兹舉也盖欲推一人之安而使天下之人舉安推一人之夀而使天下之人皆夀恩澤之厚豈有加扵此者哉書之既成大都留守臣金界奴傳􅃙命臣集序其端云臣集再拜稽首而言曰臣聞易之傳有之大㢤乾元萬物資始至哉坤元萬物資生天地之大徳不過生生而巳耳今聖皇正統於上乾道也聖后順承於中坤道也乾坤道僃於斯為盛斯民斯物之生於斯時也何其幸歟願颺言之使天下後世有以知夫髙明博厚之可見如此於戯休哉天曆三年五月朔日謹序奎章閣侍書學士翰林直學士中奉大夫知制誥同􅁱國史臣虞集譔伏覩國朝奄有四海遐邇罔不賔貢珍味竒品咸萃内府或風土有所未宜或燥濕不䏻相濟儻司庖厨者不䏻察其性味而槩於進獻則食之恐不免於致疾欽惟世祖皇帝聖明按周禮天官有師醫食醫疾醫瘍醫分職而治行依典故設掌飲膳太醫四人於本草内選無毒無相反可乆食􅀘益藥味與飲食相冝調和五味及每日所造珎品御膳必須精製所職何人所用何物進酒之時必用沉香木沙金水晶等盞斟酌適中執事務合稱職每日所用摽注於暦以驗後效至於湯煎瓊玉黄精天門冬蒼术等膏牛髄枸􅂎等煎諸珍異饌咸得其冝以此世祖皇帝聖夀延永無疾恭惟皇帝陛下自登寳位國事繁重萬機之暇遵依祖宗定制如補養調護之術飲食百味之宜進加日新則聖躬萬安矣臣思慧自延祐年間選充飲膳之職于兹有年乆叨天祿退思無以􅀘報敢不竭盡忠誠以答洪恩之萬一是以日有餘閑與趙國公臣普蘭奚將累朝親侍進用竒珍異饌湯膏煎造及諸家本草名醫方術并日所必用榖肉菓菜取其性味􅀘益者集成一書名曰飲膳正要分為三卷本草有未􅀵者今即採摭附寫伏望陛下恕其狂妄察其愚忠以燕閒之際鑑天之所生地之所養天地合氣人以禀天地氣生並而為三才三才者天地人人而有生所重乎者心也心為一身之主宰萬事之根本故身安則心􅀎應萬變主宰萬事非保養何以􅀎安其身保養之法莫若守中守中則無過與不及之病調順四時節慎飲食起居不妄使以五味調和五藏五藏和平則血氣資榮精神徤爽心志安定諸邪自不􅀎入寒暑不􅀎襲人乃怡安夫上古聖人治未病不治已病故重食輕貨盖有所取也故云食不厭精鱠不厭細魚餒肉敗者色惡者臭惡者失餁不時者皆不可食然雖食飲非聖人口腹之欲哉盖以養氣養體不以有傷也若食氣相惡則傷精若食味不調則損形形受五味以成體是以聖人先用食禁以存性後制藥以防命盖以藥性有大毒有大毒者治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九然後榖肉菓菜十養一儘之無使過之以傷其正雖飲食百味要其精粹審其有􅀘益助養之宜新陳之異温凉寒熱之性五味偏走之病若滋味偏嗜新陳不擇製造失度俱皆致疾可者行之不可者忌之如姙婦不慎行乳母不忌口則子受患若貪爽口而忘避忌則疾病潜生而中不悟百年之身而忘於一時之味其可惜哉孫思邈曰謂其醫者先曉病源知其所犯先以食療不瘥然後命藥十去其九故善養生者謹先行之攝生之法豈不為有􅁉矣飲膳正要目錄第一卷三皇聖紀養生避忌姙娠食忌乳母食忌飲酒避忌聚珍異饌馬思荅吉湯大麥湯沙吉某児湯八児不湯苦豆子湯木􅀲湯鹿頭湯松黄湯粆湯大麥筭子粉大麥片粉糯米搊粉河㹠羮阿菜湯鷄頭粉雀舌子鷄頭粉血粉鷄頭粉撧麺鷄頭粉搊粉鷄頭粉餛飩雜羮葷素羮珎珠粉黄湯三下鍋葵菜羮瓠子湯􅇛魚湯盞蒸臺苗羮熊湯鯉魚湯炒狼湯圍像春盤麺皂羮麺山藥麺掛麺經帶麺羊皮麺秃秃麻食細水滑水龍子馬乞搠羅脫因乞馬粥湯粥粱米淡粥河西米湯粥撒速湯炙羊心炙羊腰攅鷄炒鵪鶉盤兎河西肺薑黄腱子鼓児簽子帶花羊頭魚彈児諸般湯煎桂􅄴桂沉漿荔枝膏梅子丸五味子湯人參湯仙术湯杏霜湯山藥湯四和湯薑􅀥湯􅚬香湯破氣湯白梅湯木􅀲湯橘皮醒酲湯渇忒餅兒官桂渇忒餅兒荅必納餅児橙香餅児牛髄膏子木􅀲煎香圎煎株子煎紫蘇煎金橘煎櫻桃煎桃煎石榴漿小石榴煎五味舍児别赤赤哈納松子油杏子油酥油醍醐油馬思哥油枸􅂎茶玉磨茶金字茶范殿帥茶紫筍􅍉舌茶女須児西畨茶川茶藤茶夸茶燕尾茶孩児茶温桑茶清茶炒茶蘭膏酥簽建湯香茶諸水玉泉水井華水鄒店水神仙服餌瓊玉膏地仙煎金髄煎天門冬膏服地黄服蒼术服茯苓服逺志五加皮酒服桂服松子松節酒服槐實服枸􅂎服蓮花服栗子服黄精神枕法服菖蒲服胡麻服五味服藕實服蓮子蓮蕋服何首烏四時所冝五味偏走食療諸病生地黄雞羊􅁡膏羊蔵羮羊骨粥羊脊骨粥白羊腎羮猪腎粥枸􅂎羊腎粥鹿腎羮羊肉羮鹿蹄湯鹿角酒黒牛髄煎狐肉湯烏鷄湯醍醐酒山藥飥山藥粥酸􅀥粥生地黄粥椒麺羮蓽撥粥良薑粥吳茱茰粥牛肉脯蓮子粥鷄頭粥鷄頭粉羮桃仁粥生地黄粥鯽魚羮炒黄麺乳餅麺炙黄鷄牛妳子煎蓽撥獾􅁏羮黄䳄鷄青鴨羮蘿蔔粥野雞羮鵓鴿羮鷄子黄葵莱羮鯉魚湯馬齒菜粥小麥粥驢頭羮驢肉湯狐肉羮熊肉羮烏鷄酒羊肚羮􅁑粉羮荆芥粥麻子粥惡實菜烏驢皮羮羊頭膾野猪臛􅆩肝羮鯽魚羮食物利害食物相反食物中毒禽獸變異第三卷米榖品稻米粳米粟米􅆝米白􅆝黄􅆝􅎟米丹􅎟稷米河西米菉豆白豆大豆赤小豆回回豆子青小豆豌豆匾豆小麥大麥蕎麥芝麻胡麻餳􅁡麹醋醤豉塩酒虎骨酒羊羔酒枸􅂎酒五加皮酒地黄酒腽肭臍酒松節酒茯苓酒松根酒小黄米酒葡萄酒阿刺吉酒速児麻酒獸品牛羊黄羊􅗑􅴤馬野馬象駝野駝熊驢麋鹿獐犬猪野猪􅆩虎豹麅麂麝狐犀牛狼兎貍塔刺不花黄䑕猴禽品天鵞鵞鴈䳄䳓水札丹鷄野雞角雞鴨野鴨鸂䳵鴛鴦鵓鴿鳩鴇寒鴉鵪鶉雀蒿雀魚品鯉魚鯽魚魴魚白魚黄魚青魚鮎魚沙魚鱓魚河㹠鮑魚石首阿八児忽魚乞里麻魚鼈蟹蝦螺蚌蛤蜊鱸魚蝟菓品桃梨柿木􅀲梅李柰石榴林檎杏柑橘橙栗􅀥櫻桃葡萄胡桃松子蓮子鷄頭芰實荔枝龍眼銀杏橄欖楊梅榛子榧子沙糖甜􅀲西􅀲酸􅀥海紅香圎株子平坡八擔仁必思荅菜品葵菜蔓菁芫荽芥葱蒜韮冬􅀲黄􅀲蘿蔔胡蘿蔔天淨菜瓠菜􅀲葫蘆蘑菰菌子木耳竹筍蒲筍藕山藥芋萵苣白菜蓬蒿茄子莧芸臺波薐莙達香菜蓼子馬齒天花囘囘葱甘露榆仁沙吉木児出莙逹児山丹根海菜蕨薇苦買水芹料物胡椒小椒良薑茴香甘草芫荽子乾薑生薑蒔蘿陳皮草果桂薑黄蓽撥縮砂蓽澄茄五味子苦豆紅麹黒子児馬思荅吉咱夫蘭哈昔􅅺穩展即阿魏臙脂梔子蒲黄囘囘青太昊伏羲氏風姓之源皇熊氏之後生有聖徳􅁇天而王為萬世帝王之先位在東方以木徳王為蒼精之君都陳時神龍出於滎河則而畫之為八卦造書契以代結繩之政立五常定五行正君臣明父子別夫婦之義制嫁娶之理造屋舍結網􅅈以佃漁服牛乗馬引重􅆀逺取犧牲供祭祀故曰伏羲氏治天下一百一十年炎帝神農氏姜姓之源烈山氏之後生有聖徳以火承木位在南方以火徳王為赤精之君時人民茹草飲水採􅀣木之實而食蠃蛖之肉多生疾病乃求可食之物甞百草種五榖以養人民日中為市作陶冶為斧斤造耒耜教民耕稼故曰神農都曲阜治天下一百二十年黄帝軒轅氏􅁎姓之源有熊國君少典之子生而神靈長而聦明成而登天以土徳王為黄精之君故曰黄帝都涿鹿受河圗見日月星辰之象始有星官之書命大撓探五行之情占斗罡所建始作甲子命容成作曆命􅀠首作筭數命伶倫造律吕命􅄮伯定醫方為衣冠以表貴賤治干戈作舟車分州野治天下一百年
