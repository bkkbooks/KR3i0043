body:
  text: 養生避忌夫上古之人其知道者法於隂陽和于術數食飲有節起居有常不妄作勞故䏻而夀今時之人不然也起居無常飲食不知忌避亦不慎節多嗜欲厚滋味不䏻守中不知持滿故半百衰者多矣夫安樂之道在乎保養保養之道莫若守中守中則無過與不及之病春秋冬夏四時隂陽生病起于過與蓋不適其性而強故養生者既無過耗之弊又能保守真元何患乎外邪所中也故善服藥者不若善保養不善保養不若善服藥世有不善保養又不䏻善服藥倉卒病生而歸咎於神天乎善攝生者薄滋味省思慮節嗜欲戒喜怒惜元氣簡言語輕得失破憂阻除妄想逺好惡收視聽勤內固不勞神不勞形神形既安病患何由而致也故善養性者先饑而食食勿令飽先渴而飲飲勿令過食欲數而少不欲頓而多蓋飽中饑饑中飽飽則傷肺饑則傷氣若食飽不得便卧即生百病凡熱食有汗勿當風發痙病頭痛目澀多睡夜不可多食卧不可有邪風凡食訖溫水漱口令人無齒疾口臭汗出時不可扇生偏枯勿向西北大小便勿忍大小便令人成膝勞冷痺痛勿向星辰日月神堂廟宇大小便夜行勿歌唱大呌一日之忌暮勿飽食一月之忌晦勿大醉一歲之忌暮勿逺行終身之忌勿燃燈房事服藥千朝不若獨眠一宿如本命日及父母本命日不食本命所屬肉凡人坐必要端坐使正其心凡人立必要正立使直其身立不可久立傷骨坐不可久坐傷血行不可久行傷筋卧不可久卧傷氣視不可久視傷神食飽勿洗頭生風疾如患目赤病切忌房事不然令人生內障沐浴勿當風腠理百竅皆開切忌邪風易入不可登髙履􅕑奔走車馬氣亂神驚魂魄飛散大風大雨大寒大熱不可出入妄為口勿吹燈火損氣凡日光射勿凝視損人目勿望逺極目觀損眼力坐卧勿當風濕地夜勿燃燈睡魂魄不守晝勿睡損元氣食勿言寢勿語恐傷氣凡遇神堂廟宇勿得輒入凡遇風雨雷電必須閉門端坐焚香恐有諸神過怒不可暴怒生氣疾惡瘡逺唾不如近唾近唾不如不唾虎豹皮不可近肉鋪損人目避色如避箭避風如避讎莫喫空心茶少食申後粥古人有云人廣者朝不可虛暮不可實然不獨廣凡早皆忌空腹古人云爛煮麵軟煮肉少飲酒獨自宿古人平日起居而攝養今人待老而保生蓋無益凡夜卧兩手摩令熱操眼永無眼疾凡夜卧兩手摩令熱摩面不生瘡䵟一呵十搓一搓十摩久而行之皺少顔多凡清旦以熱水洗目平日無眼疾凡清旦刷牙不如夜刷牙齒疾不生凡清旦鹽刷牙平日無齒疾凡夜卧𬒳髮梳百通平日頭風少凡夜卧濯足而卧四肢無冷疾盛熱來不可冷水洗面生目疾凡枯木大樹下久隂濕地不可久坐恐隂氣觸人立秋日不可澡浴令人皮膚粗燥因生白屑常默元氣不傷少思慧燭內光不怒百神安暢不惱心地清凉樂不可極欲不可縱妊娠食忌上古聖人有胎教之法古者婦人妊子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣故太任生文王聰明聖哲聞一而知百皆胎教之能也聖人多感生妊娠故忌見喪孝破體殘疾貧窮之人宜見賢良喜慶美麗之事欲子多智觀看鯉魚孔雀欲子美麗觀看珍珠美玉欲子雄壯觀看飛鷹走犬如此善惡猶感况飲食不知避忌乎妊娠所忌食兔肉令子無聲缺唇食山羊肉令子多疾食雞子乾魚令子多瘡食桑椹鴨子令子倒生食雀肉飲酒令子心淫情亂不顧羞恥食雞肉糯米令子生寸白蟲食雀肉豆醬令子面生䵟黯食鱉肉令子項短食驢肉令子延月食冰漿絶産食騾肉令子難産乳母食忌凡生子擇於諸母必求其年壯無疾病慈善性質寬𥙿溫良詳雅寡言者使為乳母子在於母資乳以養亦大人之飲食也善惡相習况乳食不遂母性若子有病無病亦在乳母之慎口如飲食不知避忌倘不慎行貪爽口而忘身適性致疾使子受患是母令子生病矣乳母雜忌夏勿熱暑乳則子偏陽而多嘔逆冬勿寒冷乳則子偏隂而多咳痢母不欲多怒怒則氣逆乳之令子顛狂母不欲醉醉則發陽乳之令子身熱腹滿母若吐時則中虛乳之令子虛羸母有積熱蓋赤黃為熱乳之令子變黃不食新房事勞傷乳之令子瘦癢交脛不能行母勿太飽乳之母勿太飢乳之母勿太寒乳之母勿太熱乳之子有㵼痢腹痛夜啼疾乳母忌食寒凉發病之物子有積熱驚風瘡瘍乳母忌食濕熱動風之物子有疥癬瘡疾乳母忌食魚蝦雞馬肉發瘡之物子有癖疳瘦疾乳母忌食生茄黃瓜等物凡初生兒時以未啼之前用黃連浸汁調朱砂少許微抹口內去胎熱邪氣令瘡疹稀少凡初生兒時用荆芥黃連熬水入野牙猪膽汁少許洗兒在後雖生班疹惡瘡終當稀少凡小兒未生瘡疹時用臘月兔頭并毛骨同水煎湯洗兒除熱去毒能令班疹諸瘡不生雖有亦稀少凡小兒未生班疹時以黑子母驢乳令飲之及長不生瘡疹諸毒如生者亦稀少仍治小兒心熱風癎飲酒避忌酒味苦甘辛大熱有毒主行藥勢殺百邪去惡氣通血脉厚腸胃潤肌膚消憂愁少飲尤佳多飲傷神損夀易人本性其毒甚也醉飲過度喪生之源飲酒不欲使多知其過多速吐之為佳不爾成痰疾醉勿酩酊大醉即終身百病不除酒不可久飲恐腐爛腸胃漬髓蒸筋醉不可當風卧生風疾醉不可向陽卧令人發狂醉不可令人扇生偏枯醉不可露卧生冷痺醉而出汗當風為漏風醉不可卧􅎟穰生癩疾醉不可強食嗔怒生癰疽醉不可走馬及跳躑傷筋骨醉不可接房事小者面生䵟咳嗽大者傷臟澼痔疾醉不可冷水洗靣生瘡醉醒不可再投損後又損醉不可髙呼大怒令人生氣疾晦勿大醉忌月空醉不可飲酪水成噎病醉不可便卧面生瘡􅟻內生積聚大醉勿燃燈呌恐魂魄飛揚不守醉不可飲冷漿水失聲成尸噎飲酒酒漿照不兒人影勿飲醉不可忍小便成癃閉膝勞冷痺空心飲酒醉必嘔吐醉不可忍大便生腸澼痔酒忌諸甜物酒醉不可食猪肉生風醉不可強舉力傷筋損力飲酒時大不可食猪羊腦大損人煉真之士尤冝忌酒醉不可當風乘凉露腳多生腳氣醉不可卧濕地傷筋骨生冷痺痛醉不可澡浴多生眼目之疾如患眼疾人切忌醉酒食蒜聚珍異饌馬思答吉湯𥙷益溫中順氣羊肉一腳子缷成事件草果五箇官桂二錢回回豆子半升搗碎去皮右件一同熬成湯濾淨下熟回回豆子二合香粳米一升馬思答吉一錢鹽少許調和勻下事件肉芫荽葉大麥湯溫中下氣壯脾胃止煩渴破冷氣去腹脹羊肉一腳子缷成事件草果五箇大麥仁二升滚水淘洗淨微煮熟右件熬成湯濾淨下大麥仁熬熟鹽少許調和令勻下事件肉八兒不湯係西天茶飯名𥙷中下氣寬􅎍膈羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮蘿蔔二箇右件一同熬成湯濾淨湯內下羊肉切如色數大熟蘿蔔切如色數大咱夫蘭一錢薑黃二錢胡椒二錢哈昔泥半錢芫荽葉鹽少許調和勻對香粳米乾飯食之入醋少許沙乞某兒湯𥙷中下氣和脾胃羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮沙乞某兒五箇係蔓菁右件一同熬成湯濾淨下熟回回豆子二合香粳米一升熟沙乞某兒切如色數大下事件肉鹽少許調和令勻苦豆湯𥙷下元理腰膝溫中順氣羊肉一腳子缷成事件草果五箇苦豆一兩係葫蘆巴右件一同熬成湯濾淨下河西兀麻食或米心子哈昔泥半錢鹽少許調和木瓜湯𥙷中順氣治腰膝疼痛腳氣不仁羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件一同熬成湯濾淨下香粳米一升熟回回豆子二合肉彈兒木瓜二斤取汁沙糖四兩鹽少許調和或下事件肉鹿頭湯𥙷益止煩渴治腳膝疼痛鹿頭蹄一付退洗淨缷作塊右件用哈昔泥豆子大研如泥與鹿頭蹄肉同拌勻用回回小油四兩同炒入滚水熬令軟下胡椒三錢哈昔泥二錢蓽撥一錢牛妳子一盞生薑汁一合鹽少許調和一法用鹿尾取汁入薑末鹽同調和松黃湯𥙷中益氣壯筋骨羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨熟羊􅎍子一箇切作色數大松黃汁二合生薑汁半合一同下炒葱鹽醋芫荽葉調和勻對經捲兒食之粆湯𥙷中益氣建脾胃羊肉一腳子缷成事件草果五箇回回豆子半升去皮右件同熬成湯濾淨熟乾羊􅎍子一箇切片粆三升白菜或蕁麻菜一同下鍋鹽調和勻大麥算子粉𥙷中益氣建脾胃羊肉一腳子缷成事件草果五箇回回豆子半升去皮右件同熬成湯濾淨大麥粉三斤豆粉一斤同作粉羊肉炒細乞馬生薑汁二合芫荽葉鹽醋調和大麥片粉𥙷中益氣建脾胃羊肉一腳子缷成事件草果五箇良薑二錢右件同熬成湯濾淨下羊肝醬取淸汁胡椒五錢熟羊肉切作甲葉糟薑二兩瓜虀一兩切如甲葉鹽醋調和或渾汁亦可糯米粉搊粉𥙷中益氣羊肉一腳子缷成事件草果五箇良薑二錢右件同熬成湯濾淨用羊肝醬熬取清汁下胡椒五錢糯米粉二斤與豆粉一斤同作搊粉羊肉切細乞馬入鹽醋調和渾汁亦可河㹠羮𥙷中益氣羊肉一腳子卸成事件草果五箇右件同熬成湯濾淨用羊肉切細乞馬陳皮五錢去白葱二兩細切料物二錢鹽醬拌饀兒皮用白麵三斤作河㹠小油煠熟下湯內入鹽調和或清汁亦可阿菜湯𥙷中益氣羊肉一腳子卸成事件草果五箇良薑二錢右件同熬成湯濾淨下羊肝醬同取淸汁入胡椒五錢另羊肉切片羊尾子一箇羊舌一箇羊腰子一付各切甲葉蘑菰二兩白菜一同下清汁鹽醋調和雞頭粉雀舌子𥙷中益精氣羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨用雞頭粉二斤豆粉一斤同和切作子羊肉切細乞馬生薑汁一合炒葱調和雞頭粉血粉𥙷中益精氣羊肉一腳子缷成事件草果五箇回回豆子半升㨶碎去皮右件同熬成湯濾淨用雞頭粉二斤豆粉一斤羊血和作搊粉羊肉切細乞馬炒葱醋一同調和雞頭粉撧麵𥙷中益精氣羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨用雞頭粉二斤豆粉一斤白麵一斤同作麵羊肉切片兒乞馬入炒葱醋一同調和雞頭粉搊粉𥙷中益精氣羊肉一腳子缷成事件草果五箇良薑二錢右件同熬成湯濾淨用羊肝醬同取清汁入胡椒一兩次用雞頭粉二斤豆粉一斤同作搊粉羊肉切細乞馬下鹽醋調和雞頭粉餛鈍𥙷中益氣羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨用羊肉切作饀下陳皮一錢去白生薑一錢細切五味和勻次用雞頭粉二斤豆粉一斤作枕頭餛飩湯內下香粳米一升熟回回豆子二合生薑汁二合木瓜汁一合同炒葱鹽勻調和雜羮𥙷中益氣羊肉一腳子缷事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨羊頭洗淨二箇羊肚肺各二具羊白血雙腸兒一付並煮熟切次用豆粉三斤作粉蘑菰半斤杏泥半斤胡椒一兩入靑菜芫荽炒葱鹽醋調和葷素羮𥙷中益氣羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨豆粉三斤作片粉精羊肉切條道乞馬山藥一斤糟薑二塊瓜虀一塊乳餅一箇胡蘿蔔十箇蘑菰半斤生薑四兩各切雞子十箇打煎餅切用麻泥一斤杏泥半斤同炒葱鹽醋調和珍珠粉𥙷中益氣羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨羊肉切乞馬心肝肚肺各一具生薑二兩糟薑四兩瓜虀一兩胡蘿蔔十箇山藥一斤乳餅一箇雞子十箇作煎餅各切次用麻泥一斤同炒葱鹽醋調和黃湯𥙷中益氣羊肉一腳子缷成事件草果五箇回回豆子半升搗碎去皮右件同熬成湯濾淨下熟回回豆子二合