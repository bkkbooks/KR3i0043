front:
  text: 御製飲膳正要序
  hash: sha256:c558877fd2693963b2ed032873ecfcebe59010457b2eb1a9daa8ced7f51b7dd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0043_SBCK_000-1a}
body:
  text: 朕惟人物皆禀天地之氣以生者也然物又天地之所以養乎人者苟用之失其所以養則至于戕害者有矣如布帛菽粟雞豚之類日用所不䏻無其為養甚大也然過則失中不及則未至其為戕害一也其為養甚大者尚然而況不為養而為害之物焉可以不致其慎哉此特其養口體者耳若夫君子動息威儀起居出入皆當有其養焉又所以養德也嘗觀前元飲膳正要一書其所以養口體養德之要無所不載蓋當時尚醫所論著其執藝事以致忠愛雖深于聖賢之道者不外是也夫善莫大于取諸人取諸人以為善大舜所先肆朕嘉是書而用之以資攝養之助且鋟諸􅎚以廣惠利于人亦庶幾乎好生之仁雖然生禀于天非人之所能為若或戕之與立巖墻之下者同有不由于人乎故此非但攝養之助而抑順受其正之大助也景泰七年四月初一日臣聞古之君子善修其身者動息節宣以養生飲食衣服以養體威儀行義以養德是故周公之制禮也天子之起居衣服飲食各有其官皆統於冡宰蓋慎之至也今上皇帝天縱聖明文思深逺御延閣閲圗書旦暮有恆則尊養德性以酬酢萬幾得內聖外王之道焉於是趙國公臣常普蘭奚以所領膳醫臣匆思慧所撰飲膳正要以進其言曰昔世祖皇帝食飲必稽于本草動靜必凖乎法度是以身躋上夀貽子孫無彊之福焉是書也當時尚醫之論著者云噫進書者可謂能執其藝事以致其忠愛者矣是書進上中宫覽焉念祖宗衛生之戒知臣下陳義之勤思有以助聖上之誠身而推其仁民之至意命中政院使臣拜住刻梓而廣傳之兹舉也蓋欲推一人之安而使天下之人舉安推一人之夀而使天下之人皆夀恩澤之厚豈有加于此者哉書之既成大都留守臣金界奴傳敕命臣集序其端云臣集再拜稽首而言曰臣聞易之傳有之大哉乾元萬物資始至哉坤元萬物資生天地之大德不過生生而巳耳今聖皇正統於上乾道也聖后順承於中坤道也乾坤道僃於斯為盛斯民斯物之生於斯時也何其幸歟願揚言之使天下後世有以知夫髙明博厚之可見如此於戲休哉天曆三年五月朔日謹序奎章閣侍書學士翰林直學士中奉大夫知制誥同修國史臣虞集撰伏覩國朝奄有四海遐邇罔不賔貢珍味竒品咸萃內府或風土有所未宜或燥濕不䏻相濟儻司庖厨者不䏻察其性味而槩於進獻則食之恐不免於致疾欽惟世祖皇帝聖明按周禮天官有師醫食醫疾醫瘍醫分職而治行依典故設掌飲膳太醫四人於本草內選無毒無相反可久食𥙷益藥味與飲食相冝調和五味及每日所造珍品御膳必須精製所職何人所用何物進酒之時必用沉香木沙金水晶等盞斟酌適中執事務合稱職每日所用摽注於曆以驗後效至於湯煎瓊玉黃精天門冬蒼术等膏牛髓枸𣏌等煎諸珍異饌咸得其冝以此世祖皇帝聖夀延永無疾恭惟皇帝陛下自登寶位國事繁重萬機之暇遵依祖宗定制如補養調護之術飲食百味之宜進加日新則聖躬萬安矣臣思慧自延祐年間選充飲膳之職于兹有年久叨天祿退思無以𥙷報敢不竭盡忠誠以答洪恩之萬一是以日有餘間與趙國公臣普蘭奚將纍朝親侍進用竒珍異饌湯膏煎造及諸家本草名醫方術并日所必用榖肉果菜取其性味𥙷益者集成一書名曰飲膳正要分為三卷本草有未收者今即採托附寫伏望陛下恕其狂妄察其愚忠以燕閒之際鑑天之所生地之所養天地合氣人以禀天地氣生並而為三才三才者天地人人而有生所重乎者心也心為一身之主宰萬事之根本故身安則心能應萬變主宰萬事非保養何以能安其身保養之法莫若守中守中則無過與不及之病調順四時節慎飲食起居不妄使以五味調和五藏五藏和平則血氣資榮精神健爽心志安定諸邪自不能入寒暑不能襲人乃怡安夫上古聖人治未病不治已病故重食輕貨蓋有所取也故云食不厭精鱠不厭細魚餒肉敗者色惡者臭惡者失飪不時者皆不可食然雖食飲非聖人口腹之欲哉蓋以養氣養體不以有傷也若食氣相惡則傷精若食味不調則損形形受五味以成體是以聖人先用食禁以存性後制藥以防命蓋以藥性有大毒有大毒者治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九然後榖肉果菜十養一儘之無使過之以傷其正雖飲食百味要其精粹審其有𥙷益助養之宜新陳之異溫凉寒熱之性五味偏走之病若滋味偏嗜新陳不擇製造失度俱皆致疾可者行之不可者忌之如妊婦不慎行乳母不忌口則子受患若貪爽口而忘避忌則疾病潜生而中不悟百年之身而忘於一時之味其可惜哉孫思邈曰謂其醫者先曉病源知其所犯先以食療不瘥然後命藥十去其九故善養生者謹先行之攝生之法豈不為有𥙿矣飲膳正要目録第一卷三皇聖紀養生避忌妊娠食忌乳母食忌飲酒避忌聚珍異饌馬思答吉湯大麥湯沙吉某兒湯八兒不湯苦豆子湯木瓜湯鹿頭湯松黃湯粆湯大麥算子粉大麥片粉糯米搊粉河㹠羮阿菜湯雞頭粉雀舌子雞頭粉血粉雞頭粉撧麵雞頭粉搊粉雞頭粉餛飩雜羮葷素羮珍珠粉黃湯三下鍋葵菜羮瓠子湯團魚湯盞蒸臺苗羮熊湯鯉魚湯炒狼湯圍像春盤麵皂羮麵山藥麵掛麵經帶麵羊皮麵秃秃麻食細水滑水龍子馬乞搠羅脫因乞馬粥湯粥粱米淡粥河西米湯粥撒速湯炙羊心炙羊腰攢雞炒鵪鶉盤兔河西肺薑黃腱子鼓兒簽子帶花羊頭魚彈兒諸般湯煎桂漿桂沉漿荔枝膏梅子丸五味子湯人參湯仙术湯杏霜湯山藥湯四和湯薑棗湯􅚬香湯破氣湯白梅湯木瓜湯橘皮醒酲湯渴忒餅兒官桂渴忒餅兒答必納餅兒橙香餅兒牛髓膏子木瓜煎香圎煎株子煎紫蘇煎金橘煎櫻桃煎桃煎石榴漿小石榴煎五味舍兒别赤赤哈納松子油杏子油酥油醍醐