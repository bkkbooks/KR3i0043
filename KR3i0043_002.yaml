body:
  text: 諸般湯煎桂漿生津止渴益氣和中去濕逐飲生薑三斤取汁熟水二斗赤茯苓三兩去皮為末桂三兩去皮為末麴末半斤杏仁一百箇湯洗去皮尖生研為泥大麥蘖半兩為末白沙蜜三斤煉淨右用前藥蜜水拌和勻入淨磁罐內油紙封口數重泥固濟氷窖內放三日方熟綿濾氷浸暑月飲之桂沉漿去濕逐飲生津止渴順氣紫蘇葉一兩銼沉香三錢銼烏梅一兩取肉沙糖六兩右件四味用水五六碗熬至三碗濾去滓入桂漿一升合和作漿飲之荔枝膏生津止渴去煩烏梅半斤取肉桂一十兩去皮銼沙糖二十六兩麝香半錢研生薑汁五兩熟蜜一十四兩右用水一斗五升熬至一半濾去滓下沙糖生薑汁再熬去柤澄㝎少時入麝香擾勻澄清如常任意服梅子丸生津止渴解化酒毒去濕烏梅一兩半取肉白梅一兩半取肉乾木瓜一兩半紫蘇葉一兩半甘草一兩炙檀香二錢麝香一錢研右為末入麝香和勻沙糖為丸如彈大每服一丸噙化五味子湯代葡萄酒飲生津止渴暖精益氣北五味一斤淨肉紫蘇葉六兩人參四兩去蘆銼沙糖二斤右件用水二斗熬至一斗濾去滓澄清任意服之人參湯代酒飲順氣開胸膈止渴生津新羅參四兩去蘆銼橘及一兩去白紫蘇葉二兩沙糖一斤右件用水二斗焚至一斗去滓澄清任意飲之仙术湯去一切不正之氣溫脾胃進飲食辟瘟疫除寒濕蒼术一斤米泔浸三日竹刀子切片焙乾為末􅚬香二兩炒為末甘草二兩炒為末白麵一斤炒乾棗二升焙乾為末鹽四兩炒右件一同和勻每日空心白湯點服杏霜湯調順肺氣利胸膈治咳嗽粟米五升炒為麵杏仁二升去皮尖麩炒研鹽三兩炒右件拌勻每日空心白湯調一錢入酥少許尤佳山藥湯輔虛益氣溫中潤肺山藥一斤煮熟粟米半升炒為麵杏仁二斤炒令過熟去皮尖切如米右件每日空心白湯調二餞入酥油少許山藥任意四和湯治腹內冷痛脾胃不和白麵一斤炒芝麻一斤炒􅚬香二兩炒鹽一兩炒右件並為末每日空心白湯點服棗薑湯和脾胃進飲食生薑一斤切作片棗三升去核炒甘草二兩炒鹽二兩炒右件為末一處拌勻每日空心白湯點服茴香湯治元藏虛弱臍腹冷痛茴香一斤炒川練子半斤陳皮半斤去白甘草四兩炒鹽半斤炒右件為細末相和勻每日空心白湯點服破氣湯治元藏虛弱腹痛胸膈閉悶杏仁一斤去皮尖麩炒别研茴香四兩炒良薑一兩蓽澄茄二兩陳皮二兩去白桂花半斤薑黃一兩木香一兩丁香一兩甘草半斤鹽半斤右件為細末空心白湯點服白梅湯治中熱五心煩燥霍亂嘔吐乾渴津液不通白梅肉一斤白檀四兩甘草四兩鹽半斤右件為細末每服一錢入生薑汁少許白湯調下木瓜湯治腳氣不仁膝勞冷痺疼痛木瓜四箇蒸熟去皮研爛如泥白沙蜜二斤煉淨右件二味調和勻入淨磁器內盛之空心白湯點服橘皮醒酲湯治酒醉不解嘔噫吞酸香橙皮一斤去白陳橘皮一斤去白檀香四兩葛花半斤菉豆花半斤人參二兩去蘆白豆蒄仁二兩鹽六兩炒右件為細末每日空心白湯點服渴忒餅兒生津止渴治嗽渴忒一兩二錢新羅參一兩去蘆菖蒲一錢各為細末白納八三兩研係沙糖右件將渴忒用葡萄酒化成膏和上項藥末令勻為劑印作餅每用一餅徐徐噙化官桂渴忒餅兒生津止寒嗽官桂二錢為末渴忒一兩二錢新羅參一兩二錢去蘆為末白納八三兩研右件將渴忒用玫瑰水化成膏和藥末為劑用訶子油印作餅子每用一餅徐徐噙化答必納餅兒清頭目利咽膈生津止渴治嗽答必納二錢為末即草龍膽新羅參一兩二錢去蘆為末白納八五兩研右件用赤赤哈納即北地酸角兒熬成膏和藥末為劑印作餅兒每用一餅徐徐噙化橙香餅兒寬中順氣清利頭目新橙皮一兩焙去白沉香五錢白檀五錢􅒦砂五錢白豆䓻仁五錢蓽澄茄三錢南鵬砂三錢别研龍腦二錢別研麝香二錢别研右件為細末甘草膏和劑印餅每用一餅徐徐噙化牛髓膏子補精髓壯筋骨和血氣延年益夀黃精膏五兩地黃膏三兩天門冬膏一兩牛骨頭內取油二兩右件將黃精膏地黃膏天門冬膏與牛骨油一同不住手用銀匙攪令冷定和勻成膏每日空心溫酒調一匙頭木瓜煎木瓜十箇去皮穰取汁熬水盡白沙糖十斤煉淨右件一同再熬成煎香圎煎香圎二十箇去皮取肉白沙糖十斤煉淨右件一同再熬成煎株子煎株子一百箇取淨肉白沙糖五斤煉淨右件同熬成煎紫蘇煎紫蘇葉五斤乾木瓜五斤白沙糖十斤煉淨右件一同熬成煎金橘煎金橘五十箇去子取皮白沙糖三斤右件一同焚成煎櫻桃煎櫻桃五十斤取汁白沙糖二十五斤同熬成煎桃煎大桃一百箇去皮切片取汁白沙蜜二十斤煉淨右件一同熬成煎石榴漿石榴子十斤取汁白沙糖十斤煉淨右件一同熬成煎小石榴煎小石榴二斗蒸熟去子研為泥白沙蜜十斤煉淨右件一同熬成煎五味子舍兒別新北五味十斤去子水浸取汁白沙糖八斤煉淨右件一同熬成煎赤赤哈納係酸刺赤赤哈納不以多少水浸取汁右件用銀石器內熬成膏松子油松子不以多少去皮搗研為泥右件水絞取汁熬成取浮清油綿濾淨再熬澄清杏子油杏子不以多少連皮搗碎右件水煮熬取浮油綿濾淨再熬成油酥油牛乳中取浮凝熬而為酥醍醐油取上等酥油約重千斤之上者煎熬過濾淨用大磁甕貯之冬月取甕中心不凍者謂之醍醐馬思哥油取淨牛妳子不住手用阿赤係打油木器也打取浮凝者為馬思哥油今亦云白酥油枸𣏌茶枸𣏌五斗水淘洗淨去浮麥焙乾用白布筒淨去蒂蕚黑色選揀紅熟者先用雀舌茶展溲碾子茶芽不用次碾枸𣏌為細末每日空心用匙頭入酥油攪勻溫酒調下白湯亦可忌與酪同食玉磨茶上等紫筍五十斤篩筒淨蘇門炒米五十斤篩筒淨一同拌和勻入玉磨內磨之成茶金字茶係江南湖州造進末茶范殿帥茶係江浙慶元路造進茶芽味色絶勝諸茶紫筍雀舌茶選新嫩芽蒸過為紫筍有先春次春探春味皆不及紫筍雀舌女須兒出直北地面味溫甘西畨茶出本土味苦澀煎用酥油川茶藤茶夸茶皆出四川燕尾茶出江浙江西孩兒茶出廣南溫桑茶出黑峪凡諸茶味甘苦微寒無毒去痰熱止渴利小便消食下氣清神少睡清茶先用水滚過濾淨下茶芽少時煎成炒茶用鐡鍋燒赤以馬思哥油牛妳子茶芽同炒成蘭膏玉磨末茶三匙頭麵酥油同攪成膏沸湯點之酥簽金字末茶兩匙頭入酥油同攪沸湯點之建湯玉磨末茶一匙入碗內研勻百沸湯點之香茶白茶一袋龍腦成片者三錢百藥煎半錢麝香二錢同研細用香粳米熬成粥和成劑印作餅泉水甘平無毒治消渴反胃熱痢今西山有玉泉水甘美味勝諸泉井華水甘平無毒主人九竅大驚出血以水噀面即住及洗人目翳投酒醋中令不損敗平旦汲者是也今內府御用之水常於鄒店取之緣自至大初武宗皇帝幸栁林飛放請皇太后同往觀焉由是道經鄒店因渴思茶遂命普闌奚國公金界奴朵兒只煎造公親詣諸井選水惟一井水味頗清甘汲取煎茶以進上稱其茶味特異內府常進之茶味色兩絶乃命國公於井所建觀音堂蓋亭井上以欄翼之刻石紀其事自後御用之水日必取焉所造湯茶比諸水殊勝鄰左有井皆不及也此水煎熬過澄瑩如一常較其分兩與別水增重神仙服食鐡甕先生瓊玉膏此膏填精輔髓腸化為筋萬神具足五藏盈溢髓血滿髮白變黑返老還童行如奔馬日進數服終日不食亦不飢開通強志日誦萬言神識髙邁夜無夢想人年二十七歲以前服此一料可夀三百六十歲四十五歲以前服者可夀二百四十歲六十三歲以前服者可夀一百二十歲六十四歲以上服者可夀百歲服之十劑絶其欲修隂功成地仙矣一料分五處可救五人癰疾分十處可救十人勞疾修合之時沐浴至心勿輕示人新羅參二十四兩去蘆生地黃一十六斤汁白茯苓四十九兩去黑皮白沙蜜一十斤煉淨右件人參茯苓為細末蜜用生絹濾過地黃取自然汁搗時不用銅鐡器取汁盡去滓用藥一處拌和勻入銀石器或好磁器內封用淨𥿄二三十重封閉入湯內以桑柴火煮三晝夜取出用蠟紙數重包瓶口入井口去火毒一伏時取出再入舊湯內煮一日出水氣取出開封取三匙作三盞祭天地百神焚香設拜至誠端心每日空心酒調一匙頭地仙煎治腰膝疼痛一切腹內冷病令人顔色恱澤骨髓堅固行及奔馬山藥一斤杏仁一升湯泡去皮尖生牛妳子二升右件將杏仁研細入牛妳子山藥拌絞取汁用新磁瓶密封湯煮一日每日空心酒調一匙頭金髓煎延年益夀填精補髓久服髮白變黑返老還童枸𣏌不以多少採紅熟者右用無灰酒浸之冬六日夏三日於沙盆內研令爛細然後以布袋絞取汁與前浸酒一同慢火熬成膏于淨磁器內封貯重湯煮之每服一匙頭入酥油少許溫酒調下天門冬膏去積聚風痰癲疾三蟲伏尸除瘟疫輕身益氣令人不飢延年不老天門冬不以多少去皮去根鬚洗淨右件搗碎布絞取汁澄清濾過用磁器沙鍋或銀器慢火熬成膏每服一匙頭空心溫酒調下道書八帝經欲不畏寒取天門冬茯苓為末服之每日頻服大寒時汗出單衣抱朴子云杜紫微服天門冬御八十妾有子一百四十人日行三百里列仙子云赤松子食天門冬齒落更生細髮復出神仙傳甘始者太原人服天門冬在人間三百年修真祕旨神仙服天門冬一百日後怡泰和顔羸劣者強三百日身輕三年身走如飛抱朴子云楚文子服地黃八年夜視有光手上車弩抱朴子云南陽文氏值亂逃於壷山飢困有人教之食术遂不飢數年乃還鄉里顔色更少氣力轉勝藥經云必欲長生當服山精是蒼术也抱朴子云任季子服茯苓一十八年玉女從之能隱彰不食榖面生光孫真人枕中記茯苓久服百日百病除二百日夜晝二服後役使鬼神四年後玉女來侍抱朴子云陵陽仲子服逺志二十年有子三十人開書所見便記不忘東華真人煮石經舜常登蒼梧山曰厥金玉香草即五加也服之延年故云寧得一把五加不用金玉滿車寧得一斤地榆安用明月寶珠昔魯定公母單服五加皮酒以致長生如張子聲楊始建王叔才于世彥等皆古人服五加皮酒而房室不絶皆夀三百歲有子三二十人世世有服五加皮酒而獲年夀者甚衆抱朴子云趙他子服桂二十年足下毛生日行五百里力舉千斤列仙傳偓佺食松子能飛行健走如奔馬神仙傳松子不以多少研為膏空心溫酒調下一匙頭日三服則不飢渴久服日行五百里身輕體健神仙傳治百節疼痛久風虛腳痺痛松節釀酒服之神驗神仙傳槐實于牛膽中漬浸百日隂乾每日吞一枚十日身輕二十日白髮再黑百日通神食療云枸𣏌葉能令人筋骨壯除風輔益去虛勞益陽事春夏秋採葉冬採子可久食之太清諸本草七月七日採蓮花七分八月八日採蓮根八分九月九日採蓮子九分隂乾食之令人不老食療云如腎氣虛弱取生栗子不以多少令風乾之每日空心細嚼之三五箇徐徐咽之神仙服黃精成地仙昔臨川有士人虐其婢婢乃逃入山中久之見野草枝葉可愛即拔取食之甚美自是常食之久而不飢遂輕健夜息大木下聞草動以為虎懼而上木避之及曉下平地其身豁然凌空而去或自一峯之頂若飛鳥焉數歲其家採薪見之告其主使捕之不得一日遇絶壁下以網三面圍之俄而騰上山頂其主異之或曰此婢安有仙風道骨不過靈藥服食遂以酒饌五味香美置往來之路觀其食否果來食之遂不能逺去擒之問以述其故所指食之草即黃精也謹按黃精寬中益氣輔五藏調良肌肉充實骨體堅強筋骨延年不老顔色鮮明髮白再黑齒落更生神枕法漢武帝東巡泰山下見老翁鋤于道背上有白光髙數尺帝怪而問之有道術否老翁對曰臣昔年八十五時衰老垂死頭白齒落有道士者教臣服棗飲水絶榖并作神枕法中有三十二物內二十四物善以當二十四氣其八物毒以應八風臣行轉少黑髮更生墮齒復出日行三百里臣今年一百八十矣不能棄世入山顧戀子孫復還食榖又巳二十餘年猶得神枕之力往不復老武帝視老翁顔壯當如五十許人驗問其鄰人皆云信然帝乃從授其方作枕而不能隨其絶榖飲水也神枕方用五月五日七月七日取山林柏以為枕長一尺二寸髙四寸空中容一斗二升以柏心赤者為蓋厚二分蓋致之令密又使可開閉也又鑽蓋上為三行每行四十九孔凡一百四十七孔令容粟大用下項藥芎藭當歸白芷辛夷杜衡白术藁本木蘭蜀椒桂乾薑防風人參桔梗白薇荆實肉蓯蓉飛廉柏實薏苡仁欵冬花白衡秦椒麋蕪凡二十四物以應二十四氣烏頭附子䔧蘆皂角菵草凡石半夏細辛八物毒者以應八風右三十二物各一兩皆㕮咀以毒藥上安之滿枕中用囊以衣枕百日面有光澤一年體中諸疾一一皆愈而身盡香四年白髮變黑齒落重生耳目聰明神方驗祕不傳非人也武帝以問東方朔答云昔女廉以此傳玉青玉青以傳廣成子廣成子以傳黃帝近者榖城道士淳于公枕此藥枕百餘歲而頭髮不白夫病之來皆從陽脈起今枕藥枕風邪不得侵人矣又雖以布囊衣枕猶當復以幃囊重包之須欲卧時乃脫去之耳詔賜老翁匹帛老翁不受曰臣之於君猶子之於父也子知道以上之于父義不受賞又臣非賣道者以陛下好善故進此耳帝止而更賜諸藥神仙服食菖蒲尋九節者窨乾百日為末日三服久服聰明耳目延年益夀神仙服食胡麻食之能除一切痼疾久服長生肥健人延年不老抱朴子服五味十六年面色如玉入火不灼入水不濡抱朴子云韓聚服菖蒲十三年身上生毛日誦萬言冬袒不寒須得石上生者一寸九節紫花尤善食醫心鏡藕實味甘平無毒輔中養氣清神除百病久服令人止渴悅澤日華子云蓮子并石蓮去心久食令人心喜益氣止渴治腰痛泄精㵼痢日華子云蓮花蘂久服鎮心益色駐顔輕身日華子云何首烏味甘無毒久服壯筋骨益精髓黑髭鬢令人有子四時所宜春三月此謂發陳天地俱生萬物以榮夜卧早起廣步於庭被髮緩形以使志生生而勿殺子而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少春氣溫宜食麥以涼之不可一於溫也禁溫飲食及熱衣服夏三月此謂蕃秀天地氣交萬物華實夜卧卑起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病夏氣熱宜食菽以寒之不可一於熱也禁溫飲食飽食濕地濡衣服秋三月此謂容平天氣以急地氣以明早卧早起與雞俱興使志安寧以緩秋形收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飱泄奉藏者少秋氣燥宜食麻以潤其燥禁寒飲食寒衣服冬三月此謂閉藏水氷地坼無擾乎陽早卧晚起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少冬氣寒宜食􅎟以熱性治其寒禁熱飲食溫炙衣服五味偏走酸澀以收多食則膀胱不利為癃閉苦燥以堅多食則三焦閉塞為嘔吐辛味薰蒸多食則上走於肺榮衛不時而心洞鹹味湧泄多食則外注于脈胃竭咽燥而病渴甘味弱劣多食則胃柔緩而蟲過故中滿而心悶辛走氣氣病勿多食辛鹹走血血病勿多食鹹苦走骨骨病勿多食苦甘走肉肉病勿多食甘酸走筋筋病勿多食酸肝病禁食辛宜食粳米牛肉葵棗之類心病禁食鹹宜食小豆犬肉李韭之類脾病禁食酸宜食大豆豕肉栗藿之類肺病禁食苦宜食小麥羊肉杏薤之類腎病禁食甘宜食黃􅎟雞肉桃蔥之類多食酸肝氣以津脾氣乃絶則肉胝䐢而唇揭多食鹹骨氣勞短肥氣折則脈凝泣而變色多食甘心氣喘滿色黑腎氣不平則骨痛而髮落多食苦脾氣不濡胃氣乃厚則皮稿而毛拔多食辛筋脈沮弛精神乃央則筋急而爪枯五榖為食五果為助五肉為益五菜為充氣味合和而食之則補精益氣雖然五味調和食飲口嗜皆不可多也多者生疾少者為益百味珍饌日有慎節是為上矣食療諸病生地黃雞治腰背疼痛骨髓虛損不能久立身重氣乏盜汗少食時復吐利生地黃半斤飴糖五兩烏雞一枚右三味先將雞去毛腸肚淨細切地黃與糖相和勻內雞腹中以銅器中放之復置甑中蒸炊飯熟成取食之不用鹽醋唯食肉盡却飲汁羊蜜膏治虛勞腰痛咳嗽肺痿骨蒸熟羊脂五兩熟羊髓五兩白沙蜜五兩煉淨生薑汁一合生黃地汁五合右五味先以羊脂煎令沸次下羊髓又令沸次下蜜地黃生薑汁不住手攪微火熬數沸成膏每日空心溫酒調一匙頭或作羮湯或作粥食之亦可羊藏羮治腎虛勞損骨髓傷敗羊肝肚腎心肺各一具湯洗淨牛酥一兩胡椒一兩蓽撥一兩豉一合陳皮二錢去白良薑二錢草果兩箇蔥五莖右件先將羊肝等慢火煮令熟將汁濾淨和羊肝等并藥一同入羊肚內縫合口令絹袋盛之再煮熟入五味旋旋任意食之羊骨粥治虛勞腰膝無力羊骨一付全者槌碎陳皮二錢去白良薑二錢草果二箇生薑一兩鹽少許右水三斗慢火熬成汁濾出澄清如常作粥或作羮湯亦可羊脊骨羮治下元久虛腰腎傷敗羊脊骨一具全者捶碎肉蓯容一兩洗切作片草果三箇蓽撥二錢右件水熬成汁濾去滓入蔥白五味作麵羮食之白羊腎羮治虛勞陽道衰敗腰膝無力白羊腎二具切作片肉蓯蓉一兩酒浸切羊脂四兩切作片胡椒二錢陳皮一錢去白蓽撥二錢草果二錢右件相和入蔥白鹽醬煮作湯入