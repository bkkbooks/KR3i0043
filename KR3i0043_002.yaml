癲癎神情恍惚言語錯謬歌笑無度狐肉不以多少及五藏右件如常法入五味煮令爛熟空心食之熊肉羮治諸風腳氣痺痛不仁五緩筋急熊肉一斤右件於豆豉中入五味蔥醬煮熟空腹食之烏雞酒治中風背強舌直不得語目睛不轉煩熱烏雌雞一隻撏洗淨去腸肚右件以酒五升煮取酒二升去滓分作三服相繼服之汁盡無時熬蔥白生薑粥投之蓋覆取汁羊肚羮治諸中風羊肚一枚洗淨粳米二合蔥白數莖豉半合蜀椒去目閉口者炒出汗三十粒生薑二錢半細切右六味拌勻入羊肚內爛煮熟五味調和空心食之葛粉羮治中風心脾風熱言語蹇澀精神昏憤手足不遂葛粉半斤搗取粉四兩荆芥穗一兩豉三合右三味先以水煮荆芥豉六七沸去滓取汁次將葛粉作索麵於汁中煮熟空腹食之荆芥粥治中風言語蹇澀精神昏憒口面喎斜荊芥穗一兩薄荷葉一兩豉三合白粟米三合右件以水四升煮取三升去滓下米煮粥空腹食之麻子粥治中風五藏風熱語言蹇澀手足不遂大腸滯澀冬麻子二兩炒去皮研白粟米三合薄荷葉一兩荆芥穗一兩右件水三升煮薄荷荆芥去滓取汁入麻子仁同煮粥空腹食之惡實菜即牛旁子又名鼠粘子治中風燥熱口乾手足不遂及皮膚熱瘡惡實菜葉嫩肥者酥油右件以湯煮惡實葉三五升取出以新水淘過布絞取汁入五味酥點食之烏驢皮湯治中風手足不遂骨節煩疼心燥口眼面目喎斜烏驢皮一張撏洗淨右件蒸熟細切如條於豉汁中入五味調和勻煮過空心食之羊頭膾治中風頭眩羸瘦手足無力白羊頭一枚撏洗淨右件蒸令爛熟細切以五味汁調和膾空腹食之野豬臛治久痔野雞病下血不止肛門腫滿野豬肉二斤細切右件煮令爛熟入五味空心食之獺肝羮治久痔下血不止獺肝一付右件煮熟入五味空腹食之鯽魚羮治久痔腸風大便常有血大鯽魚一頭新鮮者洗淨切作片小椒二錢為未草果一錢為末右件用蔥三莖煮熟入五味空腹食之服藥食忌但服藥不可多食生芫荽及蒜雜生菜諸滑物肥豬肉犬肉油膩物魚膾腥膻等物及忌見喪尸産婦淹穢之事又不可食陳臭之物有术勿食桃李雀肉胡荽蒜青魚等物有藜蘆勿食猩肉有巴豆勿食蘆笋及野豬肉有黃連桔梗勿食豬肉有地黃勿食蕪荑有半夏菖蒲勿食飴糖及羊肉有細辛勿食生菜有甘草勿食菘菜海藻有牡丹勿食生胡荽有商陸勿食犬肉有常山勿食生蔥生菜有空青朱砂勿食血凡服藥通忌食血有茯苓勿食醋有鱉甲勿食莧菜有天門冬勿食鯉魚凡久服藥通忌未不服藥又忌滿日正五九月忌巳日二六十月忌寅日三七十一月忌亥日四八十二月忌申日食物利害蓋食物有利害者可知而避之麵有鄓氣不可食生料色臭不可用漿老而飯溲不可食煮肉不變色不可食諸肉非宰殺者勿食諸肉臭敗者不可食諸腦不可食凡祭肉自動者不可食豬羊疫死者不可食曝肉不乾者不可食馬肝牛肝皆不可食兔合眼不可食燒肉不可用桑柴火獐鹿麋四月至七月勿食二月內勿食兔肉諸肉脯忌米中貯之有毒魚餒者不可食羊肝有孔者不可食諸鳥自閉口者勿食蟹八月後可食餘月勿食蝦不可多食無鬚及腹下丹煮之白者皆不可食臘月脯臘之屬或經雨漏所漬蟲鼠嚙殘者勿食海味糟藏之屬或經濕熱變損日月過久者勿食六月七月勿食鴈鯉魚頭不可食毒在腦中諸肝青者不可食五月勿食鹿傷神九月勿食犬肉傷神十月勿食熊肉傷神不時者不可食諸果核未成者不可食諸果落地者不可食諸果蟲傷者不可食桃杏雙仁者不可食蓮子不去心食之成霍亂甜瓜雙蒂者不可食諸瓜沉水者不可食蘑菰勿多食發病榆仁不可多食令人瞑菜著霜者不可食櫻桃勿多食令人發風蔥不可多食令人虛芫荽勿多食令人多忘竹笋勿多食發病木耳赤色者不可食三月勿食蒜昏人目二月勿食蓼發病九月勿食著霜瓜四月勿食胡荽生狐臭十月勿食椒傷人心五月勿食韭昏人五藏食物相反蓋食不欲雜雜則或有所犯知者分而避之馬肉不可與倉米同食馬肉不可與蒼耳薑同食豬肉不可與牛肉同食羊肝不可與椒同食傷心兔肉不可與薑同食成霍亂羊肝不可與豬肉同食牛肉不可與栗子同食羊肚不可與小豆梅子同食傷人羊肉不可與魚膾酪同食豬肉不可與芫荽同食爛人腸馬妳子不可與魚膾同食生癥瘕鹿肉不可與鮠魚同食麋鹿不可與蝦同食麋肉脂不可與梅李同食牛肝不可與鮎魚同食生風牛腸不可與犬肉同食雞肉不可與魚汁同食生癥瘕鵪鶉肉不可與豬肉同食面生黑鵪鶉肉不可與菌子同食發痔野雞不可與蕎麵同食生蟲野雞不可與胡桃蘑菰同食野雞卵不可與蔥同食生蟲雀肉不可與李同食雞子不可與鱉肉同食雞子不可與生蔥蒜同食損氣雞肉不可與兔肉同食令人泄瀉野雞不可與鯽魚同食鴨肉不可與鱉肉同食野雞不可與豬肝同食鯉魚不可與犬肉同食野雞不可與鮎魚同食食之令人生癲疾鯽魚不可與糖同食鯽魚不可與豬肉同食黃魚不可與喬麵同食蝦不可與豬肉同食損精蝦不可與糖同食蝦不可與雞肉同食大豆黃不可與豬肉同食􅎟米不可與葵菜同食發病小豆不可與鯉魚同食楊梅不可與生蔥同食柿梨不可與蟹同食李子不可與雞子同食棗不可與蜜同食李子菱角不可與蜜同食葵菜不可與糖同食生蔥不可與蜜同食萵苣不可與酪同食竹笋不可與糖同食蓼不可與魚膾同食莧菜不可與鱉肉同食韭不可與酒同食苦苣不可與蜜同食薤不可與牛肉同食生癥瘕芥末不可與兔肉同食生瘡食物中毒諸物品類有根性本毒者有無毒而食物成毒者有雜合相畏相惡相反成毒者人不戒慎而食之致傷腑臟和亂腸胃之氣或輕或重各隨其毒而為害隨毒而解之如飲食後不知記何物毒心煩滿悶者急煎苦參汁飲令吐出或煮犀角汁飲之或苦酒好酒煮飲皆良食菜物中毒取雞糞燒灰水調服之或甘草汁或煮葛根汁飲之胡粉水調服亦可食瓜過多腹脹食鹽即消食蘑菰菌子毒地漿解之食菱角過多腹脹滿悶可暖酒和薑飲之即消食野山芋毒土漿解之食瓠中毒煮􅎟穰汁飲之即解食諸雜肉毒及馬肝漏脯中毒者燒豬骨灰調服或芫荽汁飲之或生韭汁亦可食牛羊肉中毒煎甘草汁飲之食馬肉中毒嚼杏仁即消或蘆根汁及好酒皆可食犬肉不消成䐜脹口乾杏仁去皮尖水煮飲之食魚膾過多成蟲瘕大黃汁陳皮末同鹽湯服之食蟹中毒飲紫蘇汁或冬瓜汁或生藕汁解之乾蒜汁蘆根汁亦可食魚中毒陳皮汁蘆根及大黃大豆朴消汁皆可食鴨子中毒煮秫米汁解之食雞子中毒可飲醇酒醋解之飲酒大醉不解大豆汁葛花椹子柑子皮汁皆可食牛肉中毒豬脂煉油一兩每服一匙頭溫水調下即解食豬肉中毒飲大黃汁或杏仁汁朴消汁皆可解禽獸變異禽獸形類依本體生者猶分其性質有毒無毒者况異像變生豈無毒乎倘不慎口致生疾病是不察矣獸岐尾馬蹄夜目羊心有孔肝有青黑鹿豹文羊肝有孔黑雞白首白馬青蹄羊獨角白羊黑頭黑羊白頭白鳥黃首羊六角白馬黑頭雞有四距曝肉不燥馬生角牛肝葉孤蟹有獨螯魚有眼睫蝦無鬚肉入水動肉經宿暖魚無腸膽腮肉落地不沾土魚目開合及腹下丹飲膳正要卷第二飲膳正要卷第三米穀品稻米味甘苦平無毒主溫中令人多熱大便堅不可多食即糯米也蘇門者為上釀酒者多用粳米味甘苦平無毒主益氣止煩止泄和胃氣長肌餳味甘微溫無毒輔虛乏止渴去血建脾治嗽小兒誤吞錢取一斤漸漸盡食之即出蜜味甘平微溫無毒主心腹邪氣諧驚癎輔五藏不足氣益中止痛解毒明耳目和百藥除衆病麴味甘大暖療藏府中風氣調中益氣開胃消食輔虛冷陳久者良醋味酸溫無毒消癰腫散水氣殺邪毒破血運除癥塊堅積醋有數種酒醋棗醋桃醋麥醋葡萄醋采醋為上入藥用醬味醎酸冷無毒除熱止煩殺百藥熱湯火毒殺一切魚肉菜𬞞毒豆醬主治勝麵醬陳久者尤良豉味苦寒無毒主傷寒頭痛煩燥滿悶鹽味醎溫無毒主殺鬼蠱邪疰毒傷寒吐胸中痰癖止心腹卒痛多食傷肺令人咳嗽失顔色酒味苦甘辣大熱有毒主行藥勢殺百邪通血脈厚腸胃潤皮膚消憂愁多飲損夀傷神易人本性酒有數般唯醖釀以隨其性虎骨酒以酥炙虎骨搗碎釀酒治骨節疼痛風疰冷痺痛枸𣏌酒以甘州枸杞依法釀酒補虛弱長肌肉益精氣去冷風壯陽道地黃酒以地黃絞汁釀酒治虛弱壯筋骨通血脈治腹內痛松節酒仙方以五月五日採松節銼碎煮水釀酒治冷風虛骨弱腳不能履地茯苓酒仙方依法茯苓釀酒治虛勞壯筋骨延年益夀松根酒以松樹下撅坑置甕取松根津液釀酒治風壯筋骨羊羔酒依法作酒大輔益人五加皮酒五加皮浸酒或依法釀酒治骨弱不能行走久服壯筋骨延年不老腽肭臍酒治腎虛弱壯腰膝大輔益人小黃米酒性熱不宜多飲昏人五藏煩熱多睡葡萄酒益氣調中耐飢強志酒有數等有西畨者有哈刺火者有平陽太原者其味都不及哈刺火者田地酒最佳阿刺吉酒味甘辣大熱有大毒主消冷堅積去寒氣用好酒蒸熬取露成阿刺吉速兒麻酒又名撥糟味微甘辣主益氣止渴多飲令人膨脹生痰獸品牛肉味甘平無毒主消渴止啘泄安中益氣輔脾胃牛髓輔中填精髓牛酥涼益心肺止渴嗽潤毛髮除肺痿心熱吐血牛酪味甘酸寒無毒主熱毒止消渴除􅎍中虛熱身面熱瘡牛乳腐微狼肉味醎性熱無毒主補益五藏厚腸胃填精髓腹有冷積者宜食之味勝狐犬肉狼喉嗉皮熟成皮條勒頭去頭痛狼皮熟作畨皮大暖狼尾馬􅎍堂前帶之辟邪令馬不驚狼牙帶之辟邪禽品丹雄雞味甘平微溫無毒主婦人崩中漏下赤白輔虛溫中止血白雄雞味酸無毒主下氣療狂邪補中安五藏治消渴烏雄雞味甘酸無毒主輔中止痛除心腹惡氣虛弱者冥食之烏䳄雞味甘溫無毒主風寒濕痺五緩六急中惡腹痛及傷折骨疼安胎血療乳難黃䳄雞味酸平無毒主傷中消渴小便數不禁腸澼泄痢輔五藏先患骨熱者不可食雞子益氣多食令人有聲主産後痢與小兒食之止痢日華子云雞子鎮心安五藏其白微寒療目赤熱痛除心下伏熱止煩滿咳逆雀肉味甘無毒性熱壯陽道令人有子冬月者良蒿雀味甘溫無毒食之益陽道美於諸雀紅麴味甘平無毒建脾益氣溫中淹魚肉內用黑子兒味甘平無毒開胃下氣燒餅內用極香美馬思答吉味苦香無毒去邪惡氣溫中利膈順氣止痛生津解渴令人口香生回回地面云是極香種類咱夫蘭味甘平無毒主心憂鬱積氣悶不散久食令人心喜即是回回地面紅花未詳是否哈昔泥味辛溫無毒主殺諸蟲去臭氣破癥瘕下惡除邪解蠱毒即阿魏穩展味辛溫苦無毒主殺蟲去臭其味與阿魏同又云即阿魏樹根淹羊肉香味甚美胭脂味辛溫無毒主産後血運心腹絞痛可傅逰腫梔子味苦寒無毒主五內邪氣療目赤熱利小便蒲黃味甘平無毒治心腹寒熱利小便止血疾回回靑味甘寒無毒解諸藥毒可傅熱毒瘡腫飲膳正要卷第三
